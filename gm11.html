<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asphalt Garage - Curves, Limits & Proper Progression</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&display=swap');

        :root {
            --bg: #0d0d1a;
            --gold: #ffd700;
            --orange: #ff6b35;
            --red: #ff3d00;
            --glass: rgba(10,10,25,0.82);
            --border: rgba(255,255,255,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            height: 100vh;
            width: 100vw;
        }
        #game-container { position: fixed; inset: 0; z-index: 1; }
        canvas { display: block; }

        /* === HUD === */
        #hud { position: fixed; z-index: 10; pointer-events: none; inset: 0; }

        #speed-panel {
            position: absolute; bottom: 36px; right: 26px;
            background: var(--glass);
            border: 1.5px solid rgba(255,107,53,0.45);
            border-radius: 18px; padding: 12px 22px; color: #fff; text-align: center;
            backdrop-filter: blur(14px);
            box-shadow: 0 0 24px rgba(255,70,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        #speed-value {
            font-family: 'Orbitron', monospace;
            font-size: 50px; font-weight: 900; letter-spacing: -1px;
            background: linear-gradient(135deg, #ff8c42, #ff3d00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1;
        }
        #speed-unit { font-size: 11px; color: #888; margin-top: 3px; letter-spacing: 2px; text-transform: uppercase; }

        #score-panel {
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
            background: var(--glass);
            border: 1.5px solid var(--border);
            border-radius: 32px; padding: 9px 28px; color: #fff;
            font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600;
            backdrop-filter: blur(14px); white-space: nowrap;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
            letter-spacing: 1px;
        }
        #score-value {
            font-family: 'Orbitron', monospace;
            color: var(--gold); font-size: 22px; font-weight: 900;
        }
        #total-points-display {
            position: absolute; top: 24px; right: 24px;
            background: var(--glass);
            border: 1.5px solid rgba(255,215,0,0.4);
            border-radius: 22px; padding: 8px 18px; color: var(--gold);
            font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
            backdrop-filter: blur(14px); letter-spacing: 1px;
        }
        #total-points-value { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 900; }

        #jump-indicator {
            position: absolute; top: 96px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(255,100,0,0.9), rgba(255,60,0,0.9));
            border: 1.5px solid rgba(255,180,0,0.8);
            border-radius: 22px; padding: 7px 22px; color: #fff;
            font-family: 'Orbitron', monospace; font-weight: 700; font-size: 14px;
            letter-spacing: 2px;
            opacity: 0; transition: opacity 0.12s;
            box-shadow: 0 0 18px rgba(255,100,0,0.5);
        }
        #jump-indicator.active { opacity: 1; }

        #gear-indicator {
            position: absolute; bottom: 36px; left: 26px;
            background: var(--glass);
            border: 1.5px solid var(--border);
            border-radius: 18px; padding: 12px 20px; color: #fff; text-align: center;
            backdrop-filter: blur(14px);
        }
        #gear-label { font-size: 11px; color: #666; letter-spacing: 2px; margin-bottom: 4px; }
        #gear-value {
            font-family: 'Orbitron', monospace;
            font-size: 36px; font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Progress bar for speed */
        #speed-bar-wrap {
            position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
            background: rgba(255,255,255,0.06);
        }
        #speed-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #ff3d00, #ffd700);
            transition: width 0.1s; border-radius: 0 2px 2px 0;
        }

        /* === GARAGE OVERLAY === */
        #garage-overlay {
            position: fixed; z-index: 30; inset: 0;
            background: rgba(0,0,0,0.92);
            display: flex; align-items: center; justify-content: center;
            pointer-events: all;
            backdrop-filter: blur(6px);
        }
        #garage-overlay.hidden { display: none; }
        #garage-box {
            background: linear-gradient(160deg, rgba(15,15,35,0.99) 0%, rgba(10,10,25,0.99) 100%);
            border: 2px solid rgba(255,215,0,0.35);
            border-radius: 24px; padding: 32px; text-align: center; color: #fff;
            max-width: 720px; width: 95%; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 0 60px rgba(255,215,0,0.08), 0 24px 80px rgba(0,0,0,0.6);
        }
        #garage-box::-webkit-scrollbar { width: 4px; }
        #garage-box::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
        #garage-box::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 2px; }
        #garage-title {
            font-family: 'Orbitron', monospace;
            font-size: 28px; color: var(--gold); margin-bottom: 4px;
            letter-spacing: 3px;
        }
        #garage-subtitle { font-size: 13px; color: #555; letter-spacing: 2px; margin-bottom: 20px; }
        #garage-points { font-size: 16px; color: #aaa; margin-bottom: 24px; font-weight: 600; letter-spacing: 1px; }
        #garage-points span { color: var(--gold); font-family: 'Orbitron', monospace; font-size: 20px; }

        #car-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
            gap: 12px; margin-bottom: 24px;
        }
        .car-card {
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 16px 12px; cursor: pointer;
            transition: all 0.2s ease; text-align: center;
            position: relative; overflow: hidden;
        }
        .car-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
            pointer-events: none;
        }
        .car-card:hover { border-color: rgba(255,215,0,0.6); transform: translateY(-2px); background: rgba(255,255,255,0.09); }
        .car-card.owned { border-color: rgba(80,200,80,0.5); }
        .car-card.highlighted { border-color: rgba(255,150,50,0.8); background: rgba(255,100,30,0.1); }
        .car-card.selected { border-color: var(--orange); box-shadow: 0 0 20px rgba(255,107,53,0.35); }
        .car-card.selected.owned { border-color: var(--gold); box-shadow: 0 0 22px rgba(255,215,0,0.25); }
        .car-name { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 13px; margin-bottom: 6px; color: #fff; }
        .car-stat { font-size: 11px; color: #777; margin-bottom: 2px; letter-spacing: 0.5px; }
        .car-speed { font-size: 13px; color: #aaa; font-weight: 600; margin-bottom: 4px; }
        .car-speed span { color: #fff; font-family: 'Orbitron', monospace; font-size: 14px; }
        .car-color-preview { width: 100%; height: 5px; border-radius: 3px; margin: 8px 0; opacity: 0.85; }
        .car-price { font-size: 13px; color: var(--gold); font-weight: 700; margin-top: 4px; letter-spacing: 0.5px; }
        .car-price.owned-label { color: #5c5; }
        .car-price.selected-label { color: var(--orange); }

        .garage-btn {
            display: inline-block;
            margin: 5px 8px; padding: 13px 30px; font-size: 15px; font-weight: 700;
            border: none; border-radius: 30px; cursor: pointer;
            transition: all 0.18s; color: #fff; letter-spacing: 1.5px;
            font-family: 'Rajdhani', sans-serif;
        }
        .garage-btn:hover { transform: translateY(-2px) scale(1.04); }
        .garage-btn:active { transform: scale(0.97); }
        #btn-race { background: linear-gradient(135deg, #ff6b35, #ff3d00); box-shadow: 0 4px 18px rgba(255,70,0,0.4); }
        #btn-buy { background: linear-gradient(135deg, #ffd700, #e6a000); color: #000; box-shadow: 0 4px 18px rgba(255,180,0,0.35); }

        /* === GAME OVER === */
        #game-over-overlay {
            position: fixed; z-index: 20; inset: 0;
            background: rgba(0,0,0,0.88);
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0; transition: opacity 0.4s;
            backdrop-filter: blur(4px);
        }
        #game-over-overlay.active { opacity: 1; pointer-events: all; }
        #game-over-box {
            background: linear-gradient(160deg, rgba(20,10,30,0.98) 0%, rgba(12,12,28,0.98) 100%);
            border: 1.5px solid rgba(255,255,255,0.14);
            border-radius: 28px; padding: 42px 38px; text-align: center; color: #fff;
            max-width: 400px; width: 90%;
            box-shadow: 0 32px 80px rgba(0,0,0,0.7);
        }
        #game-over-box h2 {
            font-family: 'Orbitron', monospace;
            font-size: 32px; font-weight: 900; color: #ff4444;
            letter-spacing: 3px; margin-bottom: 8px;
        }
        .go-label { font-size: 12px; color: #555; letter-spacing: 3px; margin-bottom: 4px; }
        .final-score {
            font-family: 'Orbitron', monospace;
            font-size: 58px; font-weight: 900; color: var(--gold); line-height: 1;
        }
        .earned-points { font-size: 16px; color: #aaa; margin: 10px 0 22px; font-weight: 600; }
        .earned-points span { color: #7f7; font-family: 'Orbitron', monospace; }
        .go-btn {
            margin: 6px; padding: 14px 28px; font-size: 15px; font-weight: 700;
            border: none; border-radius: 30px; cursor: pointer;
            transition: all 0.18s; letter-spacing: 1px;
            font-family: 'Rajdhani', sans-serif;
        }
        .go-btn:hover { transform: translateY(-2px) scale(1.05); }
        .go-btn:active { transform: scale(0.96); }
        #btn-retry { background: linear-gradient(135deg, #ff6b35, #ff3d00); color: #fff; box-shadow: 0 4px 16px rgba(255,70,0,0.4); }
        #btn-garage { background: linear-gradient(135deg, #ffd700, #e6a000); color: #000; box-shadow: 0 4px 16px rgba(255,190,0,0.35); }

        /* Distance counter */
        #distance-display {
            position: absolute; top: 24px; left: 24px;
            background: var(--glass); border: 1.5px solid var(--border);
            border-radius: 22px; padding: 8px 18px; color: #aaa;
            font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
            backdrop-filter: blur(14px); letter-spacing: 1px;
        }
        #distance-value { font-family: 'Orbitron', monospace; color: #ccc; font-size: 16px; }

        #mobile-hint {
            position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 1.5px;
            white-space: nowrap;
        }

        /* Notifications */
        #notif-container {
            position: absolute; top: 140px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            pointer-events: none;
        }
        .notif {
            background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px; padding: 6px 18px; color: #fff;
            font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700;
            animation: notifAnim 1.6s forwards; letter-spacing: 1px;
        }
        @keyframes notifAnim {
            0% { opacity: 0; transform: translateY(8px) scale(0.9); }
            15% { opacity: 1; transform: translateY(0) scale(1); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-16px); }
        }

        @media (max-width: 600px) {
            #speed-panel { bottom: 20px; right: 10px; padding: 10px 14px; }
            #speed-value { font-size: 36px; }
            #score-panel { top: 14px; padding: 7px 16px; font-size: 13px; }
            #score-value { font-size: 17px; }
            #total-points-display { top: 14px; right: 8px; padding: 6px 12px; font-size: 11px; }
            #total-points-value { font-size: 14px; }
            #distance-display { display: none; }
            #gear-indicator { display: none; }
            #car-list { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
            #garage-box { padding: 18px; }
            #garage-title { font-size: 20px; }
        }
    </style>
</head>
<body>
<div id="game-container"></div>

<div id="hud">
    <div id="distance-display">📍 <span id="distance-value">0</span> m</div>
    <div id="score-panel">🏆 &nbsp;<span id="score-value">0</span></div>
    <div id="total-points-display">💰 <span id="total-points-value">0</span></div>
    <div id="jump-indicator">🚀 AIR TIME!</div>
    <div id="notif-container"></div>
    <div id="speed-panel">
        <div id="speed-value">0</div>
        <div id="speed-unit">KM/H</div>
    </div>
    <div id="gear-indicator">
        <div id="gear-label">GEAR</div>
        <div id="gear-value">1</div>
    </div>
    <div id="speed-bar-wrap"><div id="speed-bar"></div></div>
    <div id="mobile-hint">◀ TAP SIDES TO CHANGE LANE ▶</div>
</div>

<div id="garage-overlay">
    <div id="garage-box">
        <div id="garage-title">GARAGE</div>
        <div id="garage-subtitle">SELECT YOUR MACHINE</div>
        <div id="garage-points">💰 Your Points: <span id="garage-total-points">0</span></div>
        <div id="car-list"></div>
        <button class="garage-btn" id="btn-buy">BUY / SELECT</button>
        <button class="garage-btn" id="btn-race">🏁 RACE!</button>
    </div>
</div>

<div id="game-over-overlay">
    <div id="game-over-box">
        <h2>💥 CRASHED!</h2>
        <div class="go-label">FINAL SCORE</div>
        <div class="final-score" id="final-score">0</div>
        <div class="earned-points">+<span id="earned-points">0</span> pts earned!</div>
        <button class="go-btn" id="btn-retry">🔄 RETRY</button>
        <button class="go-btn" id="btn-garage">🏪 GARAGE</button>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.157.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // ==================== CAR DATA ====================
    const CAR_DATA = [
        { name: 'STARTER',   color: 0xff3d00, price: 0,     speedCap: 90,   cabinColor: 0x1a1a1a, desc: 'Free starter car' },
        { name: 'SPEEDSTER', color: 0x2255cc, price: 500,   speedCap: 180,  cabinColor: 0x111111, desc: 'Double the limit!' },
        { name: 'TURBO X',   color: 0x44aa33, price: 2000,  speedCap: 320,  cabinColor: 0x1a1a1a, desc: 'Serious velocity' },
        { name: 'NITRO GT',  color: 0xeeeeee, price: 5000,  speedCap: 500,  cabinColor: 0x222222, desc: 'Supercar class' },
        { name: 'APEX R',    color: 0xffcc00, price: 15000, speedCap: 700,  cabinColor: 0x111111, desc: 'Near ultimate' },
        { name: 'GOD TIER',  color: 0xff00ff, price: 50000, speedCap: 1000, cabinColor: 0x000000, desc: 'MAXIMUM SPEED' },
    ];

    // ==================== PERSISTENT STATE ====================
    let totalPoints     = parseInt(localStorage.getItem('asphaltPoints') || '0');
    let ownedCars       = JSON.parse(localStorage.getItem('asphaltOwnedCars') || '[0]');
    let selectedCarIndex = parseInt(localStorage.getItem('asphaltSelectedCar') || '0');
    // Bug fix: ensure starter is always owned, and selectedCar is valid
    if (!ownedCars.includes(0)) ownedCars.push(0);
    if (!ownedCars.includes(selectedCarIndex)) selectedCarIndex = 0;

    // Garage highlight (separate from selectedCarIndex — fixes buy/select confusion)
    let highlightedCarIndex = selectedCarIndex;

    function saveState() {
        localStorage.setItem('asphaltPoints', totalPoints);
        localStorage.setItem('asphaltOwnedCars', JSON.stringify(ownedCars));
        localStorage.setItem('asphaltSelectedCar', selectedCarIndex);
    }
    function getSelectedCarData() { return CAR_DATA[selectedCarIndex]; }

    // ==================== DOM ====================
    const container          = document.getElementById('game-container');
    const scoreEl            = document.getElementById('score-value');
    const speedEl            = document.getElementById('speed-value');
    const speedBar           = document.getElementById('speed-bar');
    const gearEl             = document.getElementById('gear-value');
    const totalPointsDisplay = document.getElementById('total-points-value');
    const jumpIndicator      = document.getElementById('jump-indicator');
    const distanceEl         = document.getElementById('distance-value');
    const gameOverOverlay    = document.getElementById('game-over-overlay');
    const finalScoreEl       = document.getElementById('final-score');
    const earnedPointsEl     = document.getElementById('earned-points');
    const garageOverlay      = document.getElementById('garage-overlay');
    const carListEl          = document.getElementById('car-list');
    const garageTotalPoints  = document.getElementById('garage-total-points');
    const btnBuy             = document.getElementById('btn-buy');
    const btnRace            = document.getElementById('btn-race');
    const btnRetry           = document.getElementById('btn-retry');
    const btnGarage          = document.getElementById('btn-garage');
    const mobileHint         = document.getElementById('mobile-hint');
    const notifContainer     = document.getElementById('notif-container');

    function showNotif(text, color = '#fff') {
        const n = document.createElement('div');
        n.className = 'notif';
        n.style.color = color;
        n.style.borderColor = color + '55';
        n.textContent = text;
        notifContainer.appendChild(n);
        setTimeout(() => n.remove(), 1700);
    }

    // ==================== THREE.JS SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d0d1a);
    scene.fog = new THREE.FogExp2(0x0d0d1a, 0.007);

    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.5, 300);
    camera.position.set(0, 5.5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Lights
    scene.add(new THREE.AmbientLight(0x8899bb, 0.6));
    const sun = new THREE.DirectionalLight(0xfff0dd, 3.2);
    sun.position.set(30, 40, -20); sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 180;
    sun.shadow.camera.left = -40; sun.shadow.camera.right = 40;
    sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -5;
    scene.add(sun);
    scene.add(new THREE.HemisphereLight(0x8899cc, 0x334422, 0.5));

    // Ground
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(400, 400),
        new THREE.MeshStandardMaterial({ color: 0x3a6b33, roughness: 0.9 })
    );
    ground.rotation.x = -Math.PI / 2; ground.position.y = -0.12; ground.receiveShadow = true;
    scene.add(ground);

    // === ROAD ===
    const ROAD_WIDTH = 14, ROAD_SEGMENT_LENGTH = 20, NUM_SEGMENTS = 10;
    const TOTAL_ROAD_LENGTH = NUM_SEGMENTS * ROAD_SEGMENT_LENGTH;
    const BASE_LANE_X = [-4, 0, 4];

    const roadSegments = [];
    const roadGroup = new THREE.Group(); scene.add(roadGroup);
    const enemyGroup = new THREE.Group(); scene.add(enemyGroup);
    const rampGroup  = new THREE.Group(); scene.add(rampGroup);

    const roadMat = new THREE.MeshStandardMaterial({ color: 0x282828, roughness: 0.8 });
    const laneMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, emissive: 0x333333, emissiveIntensity: 0.4 });
    const edgeMat = new THREE.MeshStandardMaterial({ color: 0xffff00, roughness: 0.3, emissive: 0x555500, emissiveIntensity: 0.6 });

    function createRoadSegment() {
        const g = new THREE.Group();
        const road = new THREE.Mesh(new THREE.BoxGeometry(ROAD_WIDTH, 0.1, ROAD_SEGMENT_LENGTH), roadMat);
        road.receiveShadow = true; g.add(road);
        for (const lx of [-2, 2]) {
            const dashLen = 3.5, gap = 2.5, unit = dashLen + gap;
            for (let i = 0; i < Math.floor(ROAD_SEGMENT_LENGTH / unit) + 1; i++) {
                const dash = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.02, dashLen), laneMat);
                dash.position.set(lx, 0.07, -ROAD_SEGMENT_LENGTH / 2 + i * unit + dashLen / 2);
                g.add(dash);
            }
        }
        for (const ex of [-ROAD_WIDTH / 2, ROAD_WIDTH / 2]) {
            const edge = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.04, ROAD_SEGMENT_LENGTH), edgeMat);
            edge.position.set(ex, 0.08, 0); g.add(edge);
        }
        return g;
    }
    for (let i = 0; i < NUM_SEGMENTS; i++) {
        const seg = createRoadSegment();
        seg.position.z = -i * ROAD_SEGMENT_LENGTH;
        roadGroup.add(seg); roadSegments.push(seg);
    }

    // === SCENERY ===
    const sceneryItems = [], sceneryGroup = new THREE.Group(); scene.add(sceneryGroup);
    const buildingCols = [0x6b5b4f, 0x8a7a6a, 0x9e8e7e, 0x7d6e5d, 0x5c4f3f, 0x3d5a6e, 0x4a6d7c, 0x2d3a4a];
    const treeCols = [0x3d7a28, 0x4a8c32, 0x35801e, 0x2d6b1a, 0x52943a];

    function createBuilding(x, z) {
        const g = new THREE.Group();
        const h = 4 + Math.random() * 22, w = 2 + Math.random() * 5, d = 2 + Math.random() * 5;
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(w, h, d),
            new THREE.MeshStandardMaterial({ color: buildingCols[Math.floor(Math.random() * buildingCols.length)], roughness: 0.65 })
        );
        body.position.y = h / 2; body.castShadow = body.receiveShadow = true; g.add(body);
        // Windows
        const winMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffaa, emissiveIntensity: Math.random() * 0.8 + 0.1 });
        for (let wy = 1; wy < h - 0.5; wy += 1.5) {
            if (Math.random() < 0.5) {
                const win = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.05), winMat);
                win.position.set((Math.random() - 0.5) * (w - 0.8), wy, d / 2 + 0.01);
                g.add(win);
            }
        }
        g.position.set(x, 0, z); return g;
    }
    function createTree(x, z) {
        const g = new THREE.Group();
        const th = 1.5 + Math.random() * 2.5, tr = 0.18 + Math.random() * 0.25;
        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(tr, tr * 1.3, th, 6),
            new THREE.MeshStandardMaterial({ color: 0x6b4226, roughness: 0.8 })
        );
        trunk.position.y = th / 2; trunk.castShadow = true; g.add(trunk);
        const fMat = new THREE.MeshStandardMaterial({ color: treeCols[Math.floor(Math.random() * treeCols.length)], roughness: 0.7 });
        const layers = 2 + Math.floor(Math.random() * 2);
        for (let c = 0; c < layers; c++) {
            const cone = new THREE.Mesh(new THREE.ConeGeometry(1.4 + Math.random() * 0.5, 1.8 + Math.random() * 1.5, 7), fMat);
            cone.position.y = th + c * 1.1; cone.castShadow = true; g.add(cone);
        }
        g.position.set(x, 0, z); return g;
    }
    function spawnSceneryAtZ(z) {
        const rx = ROAD_WIDTH / 2 + 4 + Math.random() * 18;
        const lx = -ROAD_WIDTH / 2 - 4 - Math.random() * 18;
        [rx, lx].forEach(x => {
            const item = Math.random() < 0.55 ? createBuilding(x, z) : createTree(x, z);
            sceneryGroup.add(item);
            sceneryItems.push({ mesh: item, z });
        });
    }
    for (let z = -TOTAL_ROAD_LENGTH; z < 30; z += 8 + Math.random() * 12) spawnSceneryAtZ(z);

    // === CAR FACTORY ===
    function createCar(bodyColor, cabinColor = 0x222222, isPlayer = false) {
        const g = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.22, metalness: 0.65 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.5, 3.8), bodyMat);
        body.position.y = 0.45; body.castShadow = body.receiveShadow = true; g.add(body);
        const cabin = new THREE.Mesh(
            new THREE.BoxGeometry(1.65, 0.35, 1.6),
            new THREE.MeshStandardMaterial({ color: cabinColor, roughness: 0.3, metalness: 0.4 })
        );
        cabin.position.set(0, 0.8, -0.25); cabin.castShadow = true; g.add(cabin);
        const spoiler = new THREE.Mesh(
            new THREE.BoxGeometry(2.3, 0.1, 0.35),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3, metalness: 0.7 })
        );
        spoiler.position.set(0, 0.6, -1.65); spoiler.castShadow = true; g.add(spoiler);
        const wheelGeo = new THREE.CylinderGeometry(0.33, 0.33, 0.28, 10);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
        [[-1.15, 0.33, 1.15], [1.15, 0.33, 1.15], [-1.15, 0.33, -1.2], [1.15, 0.33, -1.2]].forEach(([wx, wy, wz]) => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.position.set(wx, wy, wz); w.rotation.z = Math.PI / 2; w.castShadow = true; g.add(w);
        });
        const hlGeo = new THREE.BoxGeometry(0.35, 0.15, 0.1);
        const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, roughness: 0.2, emissive: 0xffffaa, emissiveIntensity: 1.2 });
        [-0.7, 0.7].forEach(hx => { const hl = new THREE.Mesh(hlGeo, hlMat); hl.position.set(hx, 0.42, 1.92); g.add(hl); });
        const tlMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.2, emissive: 0xff0000, emissiveIntensity: 1.1 });
        [-0.7, 0.7].forEach(tx => { const tl = new THREE.Mesh(hlGeo.clone(), tlMat); tl.position.set(tx, 0.42, -1.92); g.add(tl); });
        // GOD TIER glow
        if (isPlayer && bodyColor === 0xff00ff) {
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.14 });
            const glow = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.65, 4.2), glowMat);
            glow.position.y = 0.45; g.add(glow);
        }
        return g;
    }

    // === PLAYER & GAME STATE ===
    let playerCar, currentLane = 1, laneChangeRequest = 0, laneChangeTimer = 0;
    let laneChangeStartX = 0, laneChangeTargetX = 0, laneChangeDirection = 0;
    let isJumping = false, verticalVelocity = 0;
    const JUMP_FORCE = 18, GRAVITY = -20;

    const enemyCars = [];
    const enemyColors = [0x2255cc, 0x44aa33, 0xeeeeee, 0xffcc00, 0x333333, 0x9933cc, 0x00aacc, 0xff6600];

    const ramps = [];

    let gameSpeed = 30, score = 0, isGameOver = false, gameTime = 0, screenShake = 0, totalDistance = 0;
    const ACCEL = 45, BRAKE_DECEL = 70, NAT_DECEL = 12;

    function createPlayerCar() {
        if (playerCar) {
            scene.remove(playerCar);
            playerCar.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
        }
        const data = getSelectedCarData();
        playerCar = createCar(data.color, data.cabinColor, true);
        playerCar.position.set(BASE_LANE_X[currentLane], 0.05, 0);
        playerCar.castShadow = true;
        scene.add(playerCar);
    }

    function createRamp() {
        const g = new THREE.Group();
        const rampMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.4, metalness: 0.5, emissive: 0x221100, emissiveIntensity: 0.6 });
        const slope = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.2, 1.8), rampMat);
        slope.position.y = 0.4; slope.rotation.x = 0.4; slope.castShadow = slope.receiveShadow = true; g.add(slope);
        const legMat = new THREE.MeshStandardMaterial({ color: 0xcc8800, roughness: 0.5 });
        [-1.1, 1.1].forEach(sx => {
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.2), legMat);
            leg.position.set(sx, 0.25, 0.7); leg.castShadow = true; g.add(leg);
        });
        return g;
    }
    function spawnRamp(laneIndex) {
        const x = BASE_LANE_X[laneIndex];
        const ramp = createRamp();
        ramp.position.set(x, 0, -TOTAL_ROAD_LENGTH - 10 - Math.random() * 15);
        rampGroup.add(ramp); ramps.push({ mesh: ramp, x, z: ramp.position.z, laneIndex });
    }
    function spawnEnemyCar(laneIndex) {
        const lx = BASE_LANE_X[laneIndex];
        const car = createCar(enemyColors[Math.floor(Math.random() * enemyColors.length)], Math.random() < 0.5 ? 0x111111 : 0x2a2a2a);
        car.position.set(lx, 0.05, -TOTAL_ROAD_LENGTH - Math.random() * 15);
        car.castShadow = true;
        enemyGroup.add(car); enemyCars.push({ mesh: car, x: lx, z: car.position.z, passed: false });
    }

    // === PARTICLES ===
    const particlesGroup = new THREE.Group(); scene.add(particlesGroup);
    const particlePool = [], MAX_P = 100;
    const pGeo = new THREE.SphereGeometry(0.065, 3, 2);
    for (let i = 0; i < MAX_P; i++) {
        const m = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(0.08 + Math.random() * 0.1, 0.9, 0.6 + Math.random() * 0.4), transparent: true, opacity: 0 });
        const p = new THREE.Mesh(pGeo, m);
        p.visible = false; p.userData = { life: 0, maxLife: 0, velocity: new THREE.Vector3() };
        particlesGroup.add(p); particlePool.push(p);
    }
    function emitParticle(x, y, z) {
        for (const p of particlePool) {
            if (!p.visible || p.userData.life <= 0) {
                p.position.set(x + (Math.random() - 0.5) * 2.5, y + Math.random() * 1.5, z + (Math.random() - 0.5));
                p.userData.life = 0.35 + Math.random() * 0.7;
                p.userData.maxLife = p.userData.life;
                p.userData.velocity.set((Math.random() - 0.5) * 3, -1 - Math.random() * 4, 2 + Math.random() * 6);
                p.visible = true; p.material.opacity = 0.9; p.scale.setScalar(0.5 + Math.random() * 1.4); return;
            }
        }
    }

    // === TRAFFIC LOGIC ===
    const DANGER_ZONE_START = -5, DANGER_ZONE_END = 15;
    let waveTimer = 0, waveCleared = true;
    function countEnemiesInDangerZone() { return enemyCars.filter(ec => ec.z > DANGER_ZONE_START && ec.z < DANGER_ZONE_END).length; }
    function getBlockedLanes() {
        const b = [false, false, false];
        for (const ec of enemyCars) if (ec.z > DANGER_ZONE_START && ec.z < DANGER_ZONE_END) {
            const i = BASE_LANE_X.indexOf(ec.x);
            if (i >= 0) b[i] = true;
        }
        return b;
    }
    function getOpenLanes() { const b = getBlockedLanes(); return [0, 1, 2].filter(i => !b[i]); }
    function spawnWave() {
        const openLanes = getOpenLanes();
        // Bug fix: if all lanes are blocked (stuck), clear them and reset
        if (openLanes.length === 0) {
            for (const ec of enemyCars) {
                if (ec.z > DANGER_ZONE_START && ec.z < DANGER_ZONE_END) {
                    ec.z = DANGER_ZONE_END + 10;
                    ec.mesh.position.z = ec.z;
                }
            }
            waveCleared = true; // Bug fix: reset waveCleared so wave system doesn't get stuck
            return;
        }
        const lanesToBlock = Math.min(2, openLanes.length > 1 ? 2 : 1);
        const block = [...openLanes].sort(() => Math.random() - 0.5).slice(0, lanesToBlock);
        for (const l of block) spawnEnemyCar(l);
        if (block.length === 1) {
            for (let i = ramps.length - 1; i >= 0; i--) if (ramps[i].z > DANGER_ZONE_START && ramps[i].z < DANGER_ZONE_END) { rampGroup.remove(ramps[i].mesh); ramps[i].mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); }); ramps.splice(i, 1); }
            spawnRamp(block[0]);
        } else if (block.length === 2 && Math.random() < 0.7) {
            const rl = block[Math.floor(Math.random() * 2)];
            for (let i = ramps.length - 1; i >= 0; i--) if (ramps[i].z > DANGER_ZONE_START && ramps[i].z < DANGER_ZONE_END) { rampGroup.remove(ramps[i].mesh); ramps[i].mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); }); ramps.splice(i, 1); }
            spawnRamp(rl);
        }
        waveCleared = false;
    }

    // Bug fix: pz param was unused in original — use actual player Z for collision
    function checkCollision(px, pz, ex, ez) {
        if (playerCar.position.y > 2.2) return false;
        return Math.abs(px - ex) < 1.8 && Math.abs(pz - ez) < 3.2;
    }

    // ==================== GAME FLOW ====================
    function startRace() {
        currentLane = 1; laneChangeRequest = 0; laneChangeTimer = 0;
        isJumping = false; verticalVelocity = 0;
        gameSpeed = 30; score = 0; isGameOver = false; gameTime = 0;
        screenShake = 0; waveTimer = 0; waveCleared = true; totalDistance = 0;

        for (const ec of enemyCars) { enemyGroup.remove(ec.mesh); ec.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); }); }
        enemyCars.length = 0;
        for (const r of ramps) { rampGroup.remove(r.mesh); r.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); }); }
        ramps.length = 0;

        createPlayerCar();
        const initialBlocked = [0, 1, 2].sort(() => Math.random() - 0.5).slice(0, 2);
        for (const l of initialBlocked) spawnEnemyCar(l);
        spawnRamp(initialBlocked[Math.floor(Math.random() * 2)]);

        roadSegments.forEach((s, i) => s.position.z = -i * ROAD_SEGMENT_LENGTH);
        for (const item of sceneryItems) { sceneryGroup.remove(item.mesh); item.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); }); }
        sceneryItems.length = 0;
        for (let z = -TOTAL_ROAD_LENGTH; z < 30; z += 8 + Math.random() * 12) spawnSceneryAtZ(z);
        for (const p of particlePool) { p.visible = false; p.userData.life = 0; }

        gameOverOverlay.classList.remove('active');
        garageOverlay.classList.add('hidden');
        jumpIndicator.classList.remove('active');
        scoreEl.textContent = '0'; speedEl.textContent = '0';
        totalPointsDisplay.textContent = totalPoints;
        isGameOver = false;
    }

    // Bug fix: endGame now only counts points once. restartGame no longer calls endGame.
    function endGame() {
        if (isGameOver) return;
        isGameOver = true;
        const earned = Math.floor(score);
        totalPoints += earned;
        saveState();
        finalScoreEl.textContent = Math.floor(score);
        earnedPointsEl.textContent = earned.toLocaleString();
        totalPointsDisplay.textContent = totalPoints.toLocaleString();
        garageTotalPoints.textContent = totalPoints.toLocaleString();
        gameOverOverlay.classList.add('active');
        screenShake = 1.5;
        if (playerCar) {
            playerCar.children.forEach(c => {
                if (c.material?.color?.getHex() === getSelectedCarData().color) {
                    c.material.emissive = new THREE.Color(0xff0000);
                    c.material.emissiveIntensity = 1.5;
                }
            });
            setTimeout(() => {
                if (playerCar) playerCar.children.forEach(c => { if (c.material?.emissive) c.material.emissiveIntensity = 0; });
            }, 400);
        }
    }

    // Bug fix: restartGame does NOT call endGame (avoided double point counting)
    function restartGame() {
        startRace();
    }

    // === INPUT ===
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (['ArrowUp', 'ArrowDown', 'w', 's', 'W', 'S'].includes(e.key)) e.preventDefault();
        if (e.repeat) return;
        if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') { laneChangeRequest = -1; e.preventDefault(); }
        if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') { laneChangeRequest = 1; e.preventDefault(); }
        if (isGameOver && e.key === 'Enter') startRace();
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });
    container.addEventListener('touchstart', e => {
        e.preventDefault();
        if (isGameOver) return;
        if (e.touches.length === 1) {
            const tx = e.touches[0].clientX;
            if (tx < window.innerWidth * 0.38) laneChangeRequest = -1;
            else if (tx > window.innerWidth * 0.62) laneChangeRequest = 1;
        }
    }, { passive: false });
    container.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    container.addEventListener('touchend', e => e.preventDefault());

    btnRetry.addEventListener('click', restartGame);
    // Bug fix: garage button from game-over screen — endGame already ran, just show garage
    btnGarage.addEventListener('click', () => { showGarage(); });
    btnRace.addEventListener('click', startRace);
    btnBuy.addEventListener('click', handleBuySelect);

    function getThrottle() { return (keys['ArrowUp'] || keys['w'] || keys['W']) ? 1 : ((keys['ArrowDown'] || keys['s'] || keys['S']) ? -1 : 0); }

    // ==================== GARAGE ====================
    function showGarage() {
        highlightedCarIndex = selectedCarIndex;
        garageOverlay.classList.remove('hidden');
        gameOverOverlay.classList.remove('active');
        renderGarage();
    }

    function renderGarage() {
        garageTotalPoints.textContent = totalPoints.toLocaleString();
        carListEl.innerHTML = '';
        CAR_DATA.forEach((car, index) => {
            const owned = ownedCars.includes(index);
            const isSelected = selectedCarIndex === index;
            const isHighlighted = highlightedCarIndex === index;
            const card = document.createElement('div');
            card.className = 'car-card';
            if (owned) card.classList.add('owned');
            if (isSelected) card.classList.add('selected');
            if (isHighlighted && !isSelected) card.classList.add('highlighted');

            const priceLabel = owned
                ? (isSelected ? '<span class="car-price selected-label">✅ ACTIVE</span>' : '<span class="car-price owned-label">✔ OWNED</span>')
                : `<span class="car-price">💰 ${car.price.toLocaleString()} pts</span>`;

            card.innerHTML = `
                <div class="car-name">${car.name}</div>
                <div class="car-speed">MAX <span>${car.speedCap}</span> km/h</div>
                <div class="car-stat">${car.desc}</div>
                <div class="car-color-preview" style="background:#${car.color.toString(16).padStart(6,'0')};"></div>
                ${priceLabel}
            `;
            // Bug fix: clicking highlights the card (any car), separate from selected
            card.addEventListener('click', () => {
                highlightedCarIndex = index;
                if (owned) {
                    selectedCarIndex = index;
                    saveState();
                    if (playerCar) updatePlayerCarInScene();
                }
                renderGarage();
            });
            carListEl.appendChild(card);
        });

        // Update buy button label
        const hCar = CAR_DATA[highlightedCarIndex];
        const hOwned = ownedCars.includes(highlightedCarIndex);
        if (hOwned) {
            btnBuy.textContent = selectedCarIndex === highlightedCarIndex ? '✅ SELECTED' : '🚗 SELECT';
        } else {
            btnBuy.textContent = totalPoints >= hCar.price ? `💰 BUY — ${hCar.price.toLocaleString()} pts` : `🔒 NEED ${(hCar.price - totalPoints).toLocaleString()} MORE`;
        }
    }

    function handleBuySelect() {
        const idx = highlightedCarIndex;
        if (!ownedCars.includes(idx)) {
            if (totalPoints >= CAR_DATA[idx].price) {
                totalPoints -= CAR_DATA[idx].price;
                ownedCars.push(idx);
                saveState();
                selectedCarIndex = idx;
                saveState();
                showNotif(`🏎️ ${CAR_DATA[idx].name} UNLOCKED!`, '#ffd700');
                renderGarage();
                if (playerCar) updatePlayerCarInScene();
            } else {
                showNotif(`❌ NEED ${(CAR_DATA[idx].price - totalPoints).toLocaleString()} MORE PTS`, '#ff4444');
            }
        } else {
            selectedCarIndex = idx;
            saveState();
            renderGarage();
            if (playerCar) updatePlayerCarInScene();
        }
    }

    function updatePlayerCarInScene() {
        if (!playerCar) return;
        const pos = playerCar.position.clone();
        const rot = playerCar.rotation.clone();
        scene.remove(playerCar);
        playerCar.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
        const data = getSelectedCarData();
        playerCar = createCar(data.color, data.cabinColor, true);
        playerCar.position.copy(pos); playerCar.rotation.copy(rot);
        playerCar.castShadow = true; scene.add(playerCar);
    }

    // ==================== GAME LOOP ====================
    const clock = new THREE.Clock();
    let lastMilestone = 0;

    function getGear(speed, cap) {
        const ratio = speed / cap;
        if (ratio < 0.2) return 1;
        if (ratio < 0.38) return 2;
        if (ratio < 0.55) return 3;
        if (ratio < 0.72) return 4;
        if (ratio < 0.88) return 5;
        return 6;
    }

    function animate() {
        requestAnimationFrame(animate);
        let dt = clock.getDelta();
        if (dt <= 0) dt = 0.016;
        if (dt > 0.15) dt = 0.15;

        if (!isGameOver) {
            const throttle = getThrottle();
            const carData = getSelectedCarData();
            const maxSpeed = carData.speedCap;
            gameSpeed += throttle > 0 ? ACCEL * dt : throttle < 0 ? -BRAKE_DECEL * dt : -NAT_DECEL * dt;
            gameSpeed = Math.max(15, Math.min(maxSpeed, gameSpeed));

            totalDistance += gameSpeed * dt * (1000 / 3600); // convert km/h to m/s

            // Milestone notifications
            const mile = Math.floor(totalDistance / 500) * 500;
            if (mile > lastMilestone && mile > 0) { lastMilestone = mile; showNotif(`📍 ${mile}m`, '#88aaff'); }

            // --- STRAIGHT ROAD ---
            const currentLaneX = BASE_LANE_X[currentLane];

            // Lane change
            if (laneChangeRequest !== 0 && laneChangeTimer <= 0) {
                const newLane = currentLane + laneChangeRequest;
                if (newLane >= 0 && newLane <= 2) {
                    currentLane = newLane;
                    laneChangeStartX = playerCar.position.x;
                    laneChangeTargetX = BASE_LANE_X[currentLane];
                    laneChangeDirection = laneChangeRequest;
                    laneChangeTimer = 0.25;
                }
                laneChangeRequest = 0;
            }
            if (laneChangeTimer > 0) {
                laneChangeTimer -= dt;
                const t = 1 - Math.max(0, laneChangeTimer / 0.25);
                const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                playerCar.position.x = laneChangeStartX + (laneChangeTargetX - laneChangeStartX) * ease;
                playerCar.rotation.z = -laneChangeDirection * Math.sin(t * Math.PI) * 0.4;
                playerCar.rotation.y = laneChangeDirection * Math.sin(t * Math.PI) * 0.3;
                if (laneChangeTimer <= 0) { playerCar.position.x = laneChangeTargetX; playerCar.rotation.z = 0; playerCar.rotation.y = 0; }
            } else {
                playerCar.position.x += (currentLaneX - playerCar.position.x) * 8 * dt;
                playerCar.rotation.z += (0 - playerCar.rotation.z) * 10 * dt;
                playerCar.rotation.y += (0 - playerCar.rotation.y) * 5 * dt;
            }

            // Jump
            if (isJumping) {
                verticalVelocity += GRAVITY * dt;
                playerCar.position.y += verticalVelocity * dt;
                playerCar.rotation.x = verticalVelocity * 0.08;
                jumpIndicator.classList.toggle('active', playerCar.position.y > 1.5);
                if (playerCar.position.y <= 0.05) {
                    playerCar.position.y = 0.05; isJumping = false; verticalVelocity = 0;
                    playerCar.rotation.x = 0;
                    jumpIndicator.classList.remove('active');
                    score += 50;
                    showNotif('+50 LANDING!', '#ffaa00');
                }
            }

            const scrollSpeed = gameSpeed * dt;
            roadSegments.forEach(s => {
                s.position.z += scrollSpeed;
                if (s.position.z > ROAD_SEGMENT_LENGTH + 5) s.position.z -= TOTAL_ROAD_LENGTH;
            });
            sceneryItems.forEach(item => {
                item.mesh.position.z += scrollSpeed; item.z += scrollSpeed;
                if (item.mesh.position.z > 38) { item.mesh.position.z -= TOTAL_ROAD_LENGTH + 44; item.z = item.mesh.position.z; }
            });

            // Enemy collision — Bug fix: pass actual playerCar Z
            for (const ec of enemyCars) {
                ec.mesh.position.z += scrollSpeed; ec.z = ec.mesh.position.z;
                if (!ec.passed && ec.z > 4) { ec.passed = true; score += 10 * Math.floor(gameSpeed / 20); }
                if (checkCollision(playerCar.position.x, playerCar.position.z, ec.mesh.position.x, ec.mesh.position.z)) endGame();
            }
            for (let i = enemyCars.length - 1; i >= 0; i--) {
                if (enemyCars[i].z > DANGER_ZONE_END + 10) {
                    const old = enemyCars[i]; enemyGroup.remove(old.mesh);
                    old.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
                    enemyCars.splice(i, 1);
                }
            }

            waveTimer += dt;
            const enemiesInZone = countEnemiesInDangerZone();
            if (enemiesInZone === 0 && !waveCleared) { waveCleared = true; waveTimer = 0; }
            if (waveCleared && waveTimer > 3 + Math.random() * 2) { spawnWave(); waveTimer = 0; }

            // Ramps
            let rampsAhead = 0;
            for (const r of ramps) if (r.z < DANGER_ZONE_END && r.z > -TOTAL_ROAD_LENGTH) rampsAhead++;
            if (rampsAhead < 2) {
                const openLanes = getOpenLanes();
                if (openLanes.length > 0) spawnRamp(openLanes[Math.floor(Math.random() * openLanes.length)]);
            }
            for (const r of ramps) {
                r.mesh.position.z += scrollSpeed; r.z = r.mesh.position.z;
                if (!isJumping && Math.abs(playerCar.position.x - r.x) < 1.8 && r.z > -2.5 && r.z < 4.0) {
                    isJumping = true; verticalVelocity = JUMP_FORCE; score += 25;
                    showNotif('🚀 RAMP!', '#ff8800');
                    rampGroup.remove(r.mesh);
                    r.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
                    ramps.splice(ramps.indexOf(r), 1);
                    break;
                }
                if (r.z > 30) {
                    rampGroup.remove(r.mesh);
                    r.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
                    ramps.splice(ramps.indexOf(r), 1);
                }
            }

            score += gameSpeed * dt * 0.5;

            // HUD updates
            const sp = Math.floor(gameSpeed);
            scoreEl.textContent = Math.floor(score).toLocaleString();
            speedEl.textContent = sp;
            distanceEl.textContent = Math.floor(totalDistance).toLocaleString();
            totalPointsDisplay.textContent = totalPoints.toLocaleString();
            speedBar.style.width = (sp / getSelectedCarData().speedCap * 100) + '%';
            gearEl.textContent = getGear(sp, getSelectedCarData().speedCap);

            if (screenShake > 0.001) screenShake *= Math.exp(-6 * dt); else screenShake = 0;
            if (gameSpeed > 40 && Math.random() < (gameSpeed - 30) / 60 * dt * 40)
                emitParticle(playerCar.position.x, 0.2, playerCar.position.z - 1.8);
            if (isJumping && playerCar.position.y > 1)
                for (let i = 0; i < 3; i++) emitParticle(playerCar.position.x, playerCar.position.y - 0.5, playerCar.position.z - 1);
        }

        // Particles
        for (const p of particlePool) {
            if (p.visible && p.userData.life > 0) {
                p.userData.life -= dt;
                const prog = 1 - p.userData.life / p.userData.maxLife;
                p.position.x += p.userData.velocity.x * dt;
                p.position.y += p.userData.velocity.y * dt;
                p.position.z += p.userData.velocity.z * dt;
                p.material.opacity = Math.max(0, 0.9 * (1 - prog));
                p.scale.setScalar(Math.max(0.01, p.scale.x * (1 - prog * 2.5)));
                if (p.userData.life <= 0) { p.visible = false; p.material.opacity = 0; }
            }
        }

        // Camera
        if (playerCar) {
            const jumpCamOffset = Math.max(0, playerCar.position.y - 0.5) * 0.8;
            const camX = playerCar.position.x * 0.52;
            const camY = 5.2 + (gameSpeed / 300) * 1.5 + playerCar.position.y * 0.7 + jumpCamOffset;
            const camZ = 7.5 + (gameSpeed / 200) * 3 + jumpCamOffset * 1.5;
            camera.position.x += (camX - camera.position.x) * Math.min(6 * dt * 60, 1);
            camera.position.y += (camY - camera.position.y) * Math.min(5 * dt * 60, 1);
            camera.position.z += (camZ - camera.position.z) * Math.min(5 * dt * 60, 1);
            if (screenShake > 0.001) {
                camera.position.x += (Math.random() - 0.5) * screenShake * 0.55;
                camera.position.y += (Math.random() - 0.5) * screenShake * 0.35;
            }
            camera.lookAt(new THREE.Vector3(playerCar.position.x * 0.4, 0.7 + playerCar.position.y * 0.5, playerCar.position.z - 5));
        }
        renderer.render(scene, camera);
    }

    // Resize
    function onResize() {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        // Bug fix: mobile hint visibility properly updated
        mobileHint.style.opacity = window.innerWidth > 768 ? '0' : '0.7';
    }
    window.addEventListener('resize', onResize);
    onResize();

    // Init
    totalPointsDisplay.textContent = totalPoints.toLocaleString();
    createPlayerCar();
    const initBlock = [0, 1, 2].sort(() => Math.random() - 0.5).slice(0, 2);
    for (const l of initBlock) spawnEnemyCar(l);
    spawnRamp(initBlock[Math.floor(Math.random() * 2)]);
    showGarage();
    requestAnimationFrame(animate);
</script>
</body>
</html>
