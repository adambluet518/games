<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Launcher</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: 300px;
            background-color: #1a1a1e;
            border-right: 2px solid #29292e;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 20px 20px 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4ea8de;
            text-align: center;
        }

        /* Search Bar Styling */
        .search-container {
            padding: 0 15px 15px 15px;
            border-bottom: 1px solid #29292e;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px;
            background-color: #202024;
            border: 1px solid #29292e;
            border-radius: 6px;
            color: #e1e1e6;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #4ea8de;
        }

        .games-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* Genre Section Header */
        .genre-heading {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4ea8de;
            margin: 15px 0 8px 5px;
            font-weight: bold;
        }

        .genre-heading:first-of-type {
            margin-top: 5px;
        }

        /* Game Button Styling */
        .game-btn {
            width: 100%;
            background-color: #202024;
            border: 1px solid #29292e;
            color: #e1e1e6;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .game-btn:hover {
            background-color: #29292e;
            border-color: #4ea8de;
            transform: translateX(4px);
        }

        .game-btn.active {
            background-color: #4ea8de;
            color: #121214;
            font-weight: bold;
            border-color: #4ea8de;
        }

        .game-genre {
            font-size: 0.75rem;
            color: #8d8d99;
            margin-top: 4px;
        }

        .game-btn.active .game-genre {
            color: #202024;
        }

        /* Main Viewport / Iframe styling */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #09090a;
            position: relative;
        }

        /* Top Bar for Username display */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 25px;
            background-color: #0d0d0f;
            border-bottom: 1px solid #1a1a1e;
            z-index: 10;
        }

        .user-tag {
            background-color: #1a1a1e;
            border: 1px solid #29292e;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #e1e1e6;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-tag:hover {
            border-color: #4ea8de;
            background-color: #202024;
        }

        .user-name {
            color: #4ea8de;
            font-weight: bold;
        }

        .iframe-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #09090a;
            display: none; /* Hidden until a game is selected */
        }

        /* Placeholder view when no game is running */
        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #8d8d99;
        }

        .placeholder h2 {
            color: #e1e1e6;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">🕹️ Game Launcher</div>
        
        <div class="search-container">
            <input type="text" id="search-box" class="search-input" placeholder="Search games or genres..." oninput="filterGames()">
        </div>

        <div class="games-list" id="launcher-games-list"></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="user-tag" onclick="changeUsername()" title="Click to change your username">
                <span>👤 Player:</span>
                <span id="display-username" class="user-name">Player1</span>
            </div>
        </div>

        <div class="iframe-container">
            <div class="placeholder" id="placeholder-text">
                <h2>Welcome to Your Launcher</h2>
                <p>Select a game from the sidebar to start playing!</p>
            </div>
            <iframe id="game-frame" src="" allow="fullscreen; autoplay; pointer-lock"></iframe>
        </div>
    </div>

    <script>
        // Master list of your games. You can add new ones anywhere here!
        const GAMES_DATA = [
            { id: 'gm1', title: 'Block Blast', genre: 'Puzzle', url: 'gm1.html' },
            { id: 'gm2', title: 'Cookie Clicker', genre: 'Idle / Clicker', url: 'gm2.html' },
            { id: 'gm3', title: 'Depths of Aeloria', genre: 'Text-Based RPG', url: 'gm3.html' },
            { id: 'gm4', title: 'Wordstorm', genre: 'Word / Puzzle', url: 'gm4.html' },
            { id: 'gm5', title: 'Paint Editor', genre: 'Utility / Art', url: 'gm5.html' },
            { id: 'gm6', title: 'Dragon Quest', genre: '2D Platformer', url: 'gm6.html' },
            { id: 'gm7', title: 'AdamCraft', genre: '2D Paper Minecraft', url: 'gm7.html' },
            { id: 'gm8', title: 'Code IDE', genre: 'Utility / Dev', url: 'gm8.html' },
            { id: 'gm9', title: 'Neon Drift', genre: 'Sandbox Racer', url: 'gm9.html' },
            { id: 'gm10', title: 'The Veil', genre: '3D FPS', url: 'gm10.html' },
            { id: 'gm11', title: 'Street Racer', genre: '3D Racing', url: 'gm11.html' },
            { id: 'gm12', title: '3D Dino Game', genre: '3D Endless Runner', url: 'gm12.html' },
            { id: 'gm13', title: 'Space Shooter', genre: '3D Space Shooter', url: 'gm13.html' },
            { id: 'gm14', title: 'Minecraft Clone', genre: '3D Sandbox', url: 'gm14.html' },
            { id: 'gm15', title: '3D Chess', genre: 'Board / Strategy', url: 'gm15.html' },
            { id: 'gm16', title: 'Text to Speech', genre: 'Utility / Audio', url: 'gm16.html' }
        ];

        let activeGameUrl = "";

        // Built-in username logic handling choices & memory saving
        function initUsername() {
            const savedName = localStorage.getItem('launcher_username');
            if (savedName) {
                document.getElementById('display-username').innerText = savedName;
            } else {
                document.getElementById('display-username').innerText = "Player1";
            }
        }

        function changeUsername() {
            const currentName = document.getElementById('display-username').innerText;
            const newName = prompt("Enter your custom username:", currentName);
            
            if (newName !== null && newName.trim() !== "") {
                const cleanedName = newName.trim().substring(0, 15); // limit to 15 chars so layout doesn't break
                localStorage.setItem('launcher_username', cleanedName);
                document.getElementById('display-username').innerText = cleanedName;
            }
        }

        // Function to build the layout grouped by genre
        function renderGames(searchTerm = "") {
            const listContainer = document.getElementById('launcher-games-list');
            listContainer.innerHTML = ""; // Clear existing elements

            // Step 1: Filter games based on search term
            const cleanSearch = searchTerm.toLowerCase().trim();
            const filteredGames = GAMES_DATA.filter(game => 
                game.title.toLowerCase().includes(cleanSearch) || 
                game.genre.toLowerCase().includes(cleanSearch)
            );

            // Step 2: Group filtered games by genre
            const grouped = {};
            filteredGames.forEach(game => {
                if (!grouped[game.genre]) {
                    grouped[game.genre] = [];
                }
                grouped[game.genre].push(game);
            });

            // Step 3: Sort the genres alphabetically
            const sortedGenres = Object.keys(grouped).sort();

            // Step 4: Generate HTML elements
            sortedGenres.forEach(genre => {
                // Create genre heading header
                const heading = document.createElement('div');
                heading.className = 'genre-heading';
                heading.innerText = genre;
                listContainer.appendChild(heading);

                // Create buttons belonging to this genre
                grouped[genre].forEach(game => {
                    const btn = document.createElement('button');
                    btn.className = 'game-btn';
                    if (game.url === activeGameUrl) btn.classList.add('active');
                    
                    btn.onclick = function() { loadGame(game.url, this); };
                    btn.innerHTML = `
                        <span>${game.title}</span>
                        <span class="game-genre">${game.genre}</span>
                    `;
                    listContainer.appendChild(btn);
                });
            });
        }

        // Triggered every time something is typed in the search bar
        function filterGames() {
            const query = document.getElementById('search-box').value;
            renderGames(query);
        }

        function loadGame(gameUrl, buttonElement) {
            const iframe = document.getElementById('game-frame');
            const placeholder = document.getElementById('placeholder-text');
            
            activeGameUrl = gameUrl;
            iframe.src = gameUrl;
            
            iframe.style.display = 'block';
            placeholder.style.display = 'none';

            // Reset active style statuses across all generated buttons
            const buttons = document.querySelectorAll('.game-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }

        // Run on page load to initialize
        initUsername();
        renderGames();
    </script>
</body>
</html>
