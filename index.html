<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Launcher</title>
    <style>
        /* ================= THEME DEFINITIONS ================= */
        :root, [data-theme="default"] {
            --bg-main: #121214;
            --bg-sidebar: #1a1a1e;
            --bg-card: #202024;
            --border-color: #29292e;
            --text-main: #e1e1e6;
            --text-muted: #8d8d99;
            --accent: #4ea8de;
            --bg-viewport: #09090a;
            --bg-topbar: #0d0d0f;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: none;
            --border-animation: none;
        }

        /* Cyberpunk Theme */
        [data-theme="cyberpunk"] {
            --bg-main: #0c0f12;
            --bg-sidebar: #121820;
            --bg-card: #1a233a;
            --border-color: #ff0055;
            --text-main: #00ffff;
            --text-muted: #abafb8;
            --accent: #ff0055;
            --bg-viewport: #05070a;
            --bg-topbar: #090c12;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: none;
            --border-animation: none;
        }

        /* Light Theme */
        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-sidebar: #ffffff;
            --bg-card: #e4e6eb;
            --border-color: #ccd0d5;
            --text-main: #1c1e21;
            --text-muted: #606770;
            --accent: #0078d4;
            --bg-viewport: #f9fafb;
            --bg-topbar: #e4e6eb;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: none;
            --border-animation: none;
        }

        /* Calm (Sage / Cozy Neutral) */
        [data-theme="calm"] {
            --bg-main: #f4f3ef;
            --bg-sidebar: #eadeca;
            --bg-card: #dfd5c6;
            --border-color: #b5c4b1;
            --text-main: #2f3e46;
            --text-muted: #62757f;
            --accent: #52796f;
            --bg-viewport: #fdfbf7;
            --bg-topbar: #dfd5c6;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: none;
            --border-animation: none;
        }

        /* Retro Arcade (80s Synthwave/Neon) */
        [data-theme="retro"] {
            --bg-main: #140526;
            --bg-sidebar: #22093d;
            --bg-card: #321153;
            --border-color: #39ff14;
            --text-main: #fff;
            --text-muted: #ff007f;
            --accent: #ff007f;
            --bg-viewport: #0b0214;
            --bg-topbar: #1b0731;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: none;
            --border-animation: none;
        }

        /* Midnight Ocean (Deep Blues) */
        [data-theme="ocean"] {
            --bg-main: #0b132b;
            --bg-sidebar: #1c2541;
            --bg-card: #3a506b;
            --border-color: #48cae4;
            --text-main: #edf2f4;
            --text-muted: #a3b18a;
            --accent: #00b4d8;
            --bg-viewport: #0a1128;
            --bg-topbar: #14213d;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: none;
            --border-animation: none;
        }

        /* Sunset */
        [data-theme="sunset"] {
            --bg-main: #1d1124;
            --bg-sidebar: #311836;
            --bg-card: #4d234a;
            --border-color: #ff758f;
            --text-main: #ffebd3;
            --text-muted: #ca8a8a;
            --accent: #ffb563;
            --bg-viewport: #120917;
            --bg-topbar: #241128;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: none;
            --border-animation: none;
        }

        /* Forest */
        [data-theme="forest"] {
            --bg-main: #13221b;
            --bg-sidebar: #1c3328;
            --bg-card: #284437;
            --border-color: #4f772d;
            --text-main: #ecf3ee;
            --text-muted: #90a995;
            --accent: #52b788;
            --bg-viewport: #0b1410;
            --bg-topbar: #162920;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: none;
            --border-animation: none;
        }

        /* Toxic */
        [data-theme="toxic"] {
            --bg-main: #0d0c10;
            --bg-sidebar: #15131a;
            --bg-card: #221d2b;
            --border-color: #39ff14;
            --text-main: #adff2f;
            --text-muted: #796f8a;
            --accent: #39ff14;
            --bg-viewport: #070608;
            --bg-topbar: #110e14;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: 0 0 5px #39ff14;
            --border-animation: none;
        }

        /* Rose Gold */
        [data-theme="rosegold"] {
            --bg-main: #f7ede2;
            --bg-sidebar: #f5d6cc;
            --bg-card: #e8beac;
            --border-color: #d4a373;
            --text-main: #4a332d;
            --text-muted: #8c6a60;
            --accent: #bc6c25;
            --bg-viewport: #faf6f0;
            --bg-topbar: #ecd1c5;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: none;
            --border-animation: none;
        }

        /* Glitch */
        [data-theme="glitch"] {
            --bg-main: #161033;
            --bg-sidebar: #1f1747;
            --bg-card: #2e2269;
            --border-color: #ff007f;
            --text-main: #00ffff;
            --text-muted: #9c8ce7;
            --accent: #ff007f;
            --bg-viewport: #0e0a22;
            --bg-topbar: #18123a;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: 0 0 3px #ff007f, 0 0 3px #00ffff;
            --border-animation: none;
        }

        /* Vampire */
        [data-theme="vampire"] {
            --bg-main: #100c0c;
            --bg-sidebar: #1a1212;
            --bg-card: #291a1a;
            --border-color: #800000;
            --text-main: #ffffff;
            --text-muted: #a67c7c;
            --accent: #ff0000;
            --bg-viewport: #0a0707;
            --bg-topbar: #140d0d;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: 0 0 4px #ff0000;
            --border-animation: none;
        }

        /* Flashing rainbow */
        [data-theme="rainbow"] {
            --bg-main: linear-gradient(120deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000);
            --bg-sidebar: linear-gradient(120deg, #1a0000, #1a0d00, #1a1a00, #001a00, #00001a, #0b001a, #14001a, #1a0000);
            --bg-card: rgba(255, 255, 255, 0.07);
            --border-color: rgba(255, 255, 255, 0.4);
            --text-main: #ffffff;
            --text-muted: #e0e0e0;
            --accent: #ffffff;
            --bg-viewport: #050508;
            --bg-topbar: rgba(0, 0, 0, 0.6);
            --sidebar-animation: movingBG 8s linear infinite;
            --main-animation: movingBG 8s linear infinite;
            --text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
            --border-animation: none;
        }

        /* ================= ANIMATED MODES ================= */
        
        /* Sunset shimmer */
        [data-theme="sunset-shimmer"] {
            --bg-main: linear-gradient(45deg, #1d1124, #4d234a, #ff758f, #ffb563, #1d1124);
            --bg-sidebar: linear-gradient(45deg, #120917, #241128, #4d234a, #120917);
            --bg-card: rgba(255, 255, 255, 0.06);
            --border-color: #ff758f;
            --text-main: #ffebd3;
            --text-muted: #ca8a8a;
            --accent: #ffb563;
            --bg-viewport: #0d0612;
            --bg-topbar: rgba(29, 17, 36, 0.7);
            --sidebar-animation: movingBG 12s ease infinite;
            --main-animation: movingBG 12s ease infinite;
            --text-shadow: 0 0 4px rgba(255, 181, 99, 0.4);
            --border-animation: none;
        }

        /* Glitch matrix */
        [data-theme="glitch-matrix"] {
            --bg-main: #0c081f;
            --bg-sidebar: #130d2e;
            --bg-card: #1c1345;
            --border-color: #ff007f;
            --text-main: #00ffff;
            --text-muted: #7f6cb3;
            --accent: #ff007f;
            --bg-viewport: #070414;
            --bg-topbar: #0f0a24;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: 0 0 3px #ff007f, 0 0 3px #00ffff;
            --border-animation: glitchFlicker 0.4s linear infinite;
        }
        [data-theme="glitch-matrix"] .sidebar-header, 
        [data-theme="glitch-matrix"] .user-name {
            animation: textVibrate 0.15s linear infinite;
        }

        /* Toxic hazard */
        [data-theme="toxic-hazard"] {
            --bg-main: #0a0a0c;
            --bg-sidebar: #111114;
            --bg-card: #18191f;
            --border-color: #39ff14;
            --text-main: #adff2f;
            --text-muted: #5e6952;
            --accent: #39ff14;
            --bg-viewport: #050506;
            --bg-topbar: #0d0d10;
            --sidebar-animation: none;
            --main-animation: none;
            --text-shadow: 0 0 5px #39ff14;
            --border-animation: toxicPulse 2.5s ease-in-out infinite;
        }

        /* Cosmic nebula */
        [data-theme="cosmic-nebula"] {
            --bg-main: linear-gradient(135deg, #050515, #12072b, #2b0e4a, #07193b, #050515);
            --bg-sidebar: linear-gradient(135deg, #02020a, #0b041c, #160726, #02020a);
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-color: #9d4edd;
            --text-main: #e0aaff;
            --text-muted: #7b2cbf;
            --accent: #240046;
            --bg-viewport: #020208;
            --bg-topbar: rgba(10, 5, 25, 0.7);
            --sidebar-animation: movingBG 16s ease infinite;
            --main-animation: movingBG 16s ease infinite;
            --text-shadow: 0 0 8px #c77dff;
            --border-animation: none;
        }
        [data-theme="cosmic-nebula"] .game-btn.active {
            background: #c77dff;
            color: #12072b;
            box-shadow: 0 0 12px #c77dff;
        }

        /* Magma core */
        [data-theme="magma-core"] {
            --bg-main: linear-gradient(90deg, #120202, #2d0808, #610c0c, #900c3f, #2d0808, #120202);
            --bg-sidebar: linear-gradient(90deg, #0d0101, #1f0505, #420808, #0d0101);
            --bg-card: rgba(0, 0, 0, 0.4);
            --border-color: #ff4d4d;
            --text-main: #ffcccc;
            --text-muted: #803333;
            --accent: #ff3333;
            --bg-viewport: #050000;
            --bg-topbar: rgba(20, 4, 4, 0.8);
            --sidebar-animation: movingBG 7s linear infinite;
            --main-animation: movingBG 7s linear infinite;
            --text-shadow: 0 0 6px #ff3333;
            --border-animation: none;
        }
        [data-theme="magma-core"] .game-btn.active {
            background: #ff3333;
            color: #000000;
            box-shadow: 0 0 10px #ff3333;
        }


        /* ================= ANIMATION KEYFRAMES ================= */
        @keyframes movingBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes toxicPulse {
            0% { border-color: #186609; box-shadow: 0 0 2px #186609; }
            50% { border-color: #39ff14; box-shadow: 0 0 12px #39ff14; }
            100% { border-color: #186609; box-shadow: 0 0 2px #186609; }
        }

        @keyframes glitchFlicker {
            0% { border-color: #ff007f; box-shadow: 0 0 4px #ff007f; }
            23% { border-color: #ff007f; }
            25% { border-color: #00ffff; box-shadow: 0 0 8px #00ffff; }
            27% { border-color: #ff007f; }
            78% { border-color: #ff007f; }
            80% { border-color: #00ffff; box-shadow: 0 0 2px #00ffff; }
            82% { border-color: #ff007f; }
            100% { border-color: #ff007f; box-shadow: 0 0 4px #ff007f; }
        }

        @keyframes textVibrate {
            0% { transform: translate(0); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(-1px, -1px); }
            60% { transform: translate(1px, 1px); }
            80% { transform: translate(1px, -1px); }
            100% { transform: translate(0); }
        }


        /* ================= BASE STYLES ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-main);
            background-size: 200% 200%;
            animation: var(--main-animation);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        .sidebar {
            width: 300px;
            background: var(--bg-sidebar);
            background-size: 200% 200%;
            animation: var(--sidebar-animation), var(--border-animation);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: background 0.2s, border 0.2s;
        }

        .sidebar-header {
            padding: 20px 20px 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
            text-shadow: var(--text-shadow);
            text-align: center;
        }

        .search-container {
            padding: 0 15px 15px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 10px 12px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            backdrop-filter: blur(4px);
            animation: var(--border-animation);
            transition: background 0.2s, border 0.2s, color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .roulette-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            backdrop-filter: blur(4px);
            animation: var(--border-animation);
            transition: all 0.2s;
        }

        .roulette-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .games-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .genre-heading {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            text-shadow: var(--text-shadow);
            margin: 15px 0 8px 5px;
            font-weight: bold;
        }

        .genre-heading:first-of-type {
            margin-top: 5px;
        }

        .game-btn-container {
            position: relative;
            margin-bottom: 10px;
        }

        .game-btn {
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 45px 12px 15px;
            border-radius: 6px;
            text-align: left;
            cursor: pointer;
            backdrop-filter: blur(4px);
            animation: var(--border-animation);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .game-btn:hover {
            background-color: var(--border-color);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .game-btn.active {
            background: var(--accent);
            color: #121214;
            font-weight: bold;
            border-color: var(--accent);
        }

        [data-theme="rainbow"] .game-btn.active {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 10px #ffffff;
        }

        .game-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
        }

        .game-btn.active .game-meta {
            color: inherit;
            opacity: 0.8;
        }

        .fav-star {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 5;
            transition: color 0.2s;
        }

        .fav-star.favorited {
            color: #ffca28 !important;
            text-shadow: 0 0 5px rgba(255,202,40,0.6);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-viewport);
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 25px;
            background: var(--bg-topbar);
            border-bottom: 1px solid var(--border-color);
            animation: var(--border-animation);
            z-index: 10;
            gap: 15px;
            transition: background 0.2s, border 0.2s;
        }

        .theme-select {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            backdrop-filter: blur(4px);
            animation: var(--border-animation);
            transition: background 0.2s, border 0.2s, color 0.2s;
        }

        .theme-select option {
            background-color: #1a1a1e;
            color: #e1e1e6;
        }

        .user-tag {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            animation: var(--border-animation);
            transition: background 0.2s, border 0.2s, color 0.2s;
        }

        .user-tag:hover, .theme-select:hover {
            border-color: var(--accent);
        }

        .user-name {
            color: var(--accent);
            text-shadow: var(--text-shadow);
            font-weight: bold;
        }

        /* Sleek Close Button Styles */
        .close-btn {
            background-color: #e63946;
            border: none;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            display: none; /* Initially hidden */
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background-color 0.2s, transform 0.1s;
        }

        .close-btn:hover {
            background-color: #ff4d5a;
            transform: scale(1.03);
        }

        [data-theme="rainbow"] .user-name {
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
        }

        .iframe-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: var(--bg-viewport);
            display: none;
        }

        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
        }

        .placeholder h2 {
            color: var(--text-main);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">🕹️ Game Launcher</div>
        
        <div class="search-container">
            <input type="text" id="search-box" class="search-input" placeholder="Search..." oninput="filterGames()">
            <button class="roulette-btn" onclick="rollRoulette()" title="Play a random game!">🎲</button>
        </div>

        <div class="games-list" id="launcher-games-list"></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <button id="close-game-btn" class="close-btn" onclick="closeActiveGame()">❌ Close Game</button>
            
            <select id="theme-picker" class="theme-select" onchange="changeTheme(this.value)">
                <option value="default">Dark Mode</option>
                <option value="light">Light Mode</option>
                <option value="cyberpunk">Cyberpunk</option>
                <option value="calm">Calm (Sage)</option>
                <option value="retro">Retro Arcade</option>
                <option value="ocean">Midnight Ocean</option>
                <option value="sunset">Sunset</option>
                <option value="forest">Forest</option>
                <option value="toxic">Toxic</option>
                <option value="rosegold">Rose Gold</option>
                <option value="glitch">Glitch</option>
                <option value="vampire">Vampire</option>
                <option value="rainbow">Flashing rainbow</option>
                <option value="sunset-shimmer">Sunset shimmer</option>
                <option value="glitch-matrix">Glitch matrix</option>
                <option value="toxic-hazard">Toxic hazard</option>
                <option value="cosmic-nebula">Cosmic nebula</option>
                <option value="magma-core">Magma core</option>
            </select>
            <div class="user-tag" onclick="changeUsername()">
                <span>👤 Player:</span>
                <span id="display-username" class="user-name">Player1</span>
            </div>
        </div>

        <div class="iframe-container">
            <div class="placeholder" id="placeholder-text">
                <h2>Welcome to Your Launcher</h2>
                <p>Select a game from the sidebar to start playing!</p>
            </div>
            <iframe id="game-frame" src="" allow="fullscreen; autoplay; pointer-lock"></iframe>
        </div>
    </div>

    <script>
        const GAMES_DATA = [
            { id: 'gm1', title: 'Block Blast', genre: 'Puzzles & Idles', url: 'gm1.html' },
            { id: 'gm2', title: 'Cookie Clicker', genre: 'Puzzles & Idles', url: 'gm2.html' },
            { id: 'gm3', title: 'Depths of Aeloria', genre: 'RPG & Word Games', url: 'gm3.html' },
            { id: 'gm4', title: 'Wordstorm', genre: 'RPG & Word Games', url: 'gm4.html' },
            { id: 'gm5', title: 'Paint Editor', genre: 'Utilities', url: 'gm5.html' },
            { id: 'gm6', title: 'Dragon Quest', genre: '2D Games', url: 'gm6.html' },
            { id: 'gm7', title: 'AdamCraft', genre: '2D Games', url: 'gm7.html' },
            { id: 'gm8', title: 'Code IDE', genre: 'Utilities', url: 'gm8.html' },
            { id: 'gm9', title: 'Neon Drift', genre: '3D Games', url: 'gm9.html' },
            { id: 'gm10', title: 'The Veil', genre: '3D Games', url: 'gm10.html' },
            { id: 'gm11', title: 'Street Racer', genre: '3D Games', url: 'gm11.html' },
            { id: 'gm12', title: '3D Dino Game', genre: '3D Games', url: 'gm12.html' },
            { id: 'gm13', title: 'Space Shooter', genre: '3D Games', url: 'gm13.html' },
            { id: 'gm14', title: 'Minecraft Clone', genre: '3D Games', url: 'gm14.html' },
            { id: 'gm15', title: '3D Chess', genre: '3D Games', url: 'gm15.html' },
            { id: 'gm16', title: 'Text to Speech', genre: 'Utilities', url: 'gm16.html' }
        ];

        let activeGameId = "";
        let playtimeTicker = null;

        let favorites = JSON.parse(localStorage.getItem('launcher_favorites')) || [];
        let playtimes = JSON.parse(localStorage.getItem('launcher_playtimes')) || {};

        function renderGames(searchTerm = "") {
            const listContainer = document.getElementById('launcher-games-list');
            listContainer.innerHTML = "";

            const cleanSearch = searchTerm.toLowerCase().trim();
            const filteredGames = GAMES_DATA.filter(game => 
                game.title.toLowerCase().includes(cleanSearch) || game.genre.toLowerCase().includes(cleanSearch)
            );

            const grouped = {};
            if (favorites.length > 0 && cleanSearch === "") {
                grouped["⭐ Favorites"] = GAMES_DATA.filter(g => favorites.includes(g.id));
            }

            filteredGames.forEach(game => {
                if (!grouped[game.genre]) grouped[game.genre] = [];
                grouped[game.genre].push(game);
            });

            const sortedGenres = Object.keys(grouped).sort((a, b) => a === "⭐ Favorites" ? -1 : b === "⭐ Favorites" ? 1 : a.localeCompare(b));

            sortedGenres.forEach(genre => {
                const heading = document.createElement('div');
                heading.className = 'genre-heading';
                heading.innerText = genre;
                listContainer.appendChild(heading);

                grouped[genre].forEach(game => {
                    const container = document.createElement('div');
                    container.className = 'game-btn-container';

                    const isFav = favorites.includes(game.id);
                    const minutes = playtimes[game.id] ? Math.floor(playtimes[game.id] / 60) : 0;
                    const timeText = minutes > 0 ? `${minutes}m played` : 'Never played';

                    const btn = document.createElement('button');
                    btn.className = `game-btn ${game.id === activeGameId ? 'active' : ''}`;
                    btn.onclick = () => loadGame(game);
                    btn.innerHTML = `
                        <span>${game.title}</span>
                        <span class="game-meta"><span>${game.genre}</span><span>${timeText}</span></span>
                    `;

                    const star = document.createElement('button');
                    star.className = `fav-star ${isFav ? 'favorited' : ''}`;
                    star.innerHTML = '★';
                    star.onclick = (e) => {
                        e.stopPropagation();
                        toggleFavorite(game.id);
                    };

                    container.appendChild(btn);
                    container.appendChild(star);
                    listContainer.appendChild(container);
                });
            });
        }

        function loadGame(game) {
            const iframe = document.getElementById('game-frame');
            const placeholder = document.getElementById('placeholder-text');
            const closeBtn = document.getElementById('close-game-btn');
            
            clearInterval(playtimeTicker);
            activeGameId = game.id;
            iframe.src = game.url;
            iframe.style.display = 'block';
            placeholder.style.display = 'none';
            closeBtn.style.display = 'flex'; // Display close option instantly

            playtimeTicker = setInterval(() => {
                if (!playtimes[game.id]) playtimes[game.id] = 0;
                playtimes[game.id] += 10;
                localStorage.setItem('launcher_playtimes', JSON.stringify(playtimes));
                renderGames(document.getElementById('search-box').value);
            }, 10000);

            renderGames(document.getElementById('search-box').value);
        }

        // Logic function to exit current loaded module cleanly
        function closeActiveGame() {
            const iframe = document.getElementById('game-frame');
            const placeholder = document.getElementById('placeholder-text');
            const closeBtn = document.getElementById('close-game-btn');
            
            clearInterval(playtimeTicker);
            activeGameId = "";
            iframe.src = "";
            iframe.style.display = 'none';
            placeholder.style.display = 'block';
            closeBtn.style.display = 'none'; // Hide close button away again

            renderGames(document.getElementById('search-box').value);
        }

        function filterGames() {
            renderGames(document.getElementById('search-box').value);
        }

        function toggleFavorite(id) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('launcher_favorites', JSON.stringify(favorites));
            renderGames(document.getElementById('search-box').value);
        }

        function rollRoulette() {
            const randomGame = GAMES_DATA[Math.floor(Math.random() * GAMES_DATA.length)];
            loadGame(randomGame);
        }

        function changeUsername() {
            const currentName = document.getElementById('display-username').innerText;
            const newName = prompt("Enter custom username:", currentName);
            if (newName && newName.trim() !== "") {
                const clean = newName.trim().substring(0, 15);
                localStorage.setItem('launcher_username', clean);
                document.getElementById('display-username').innerText = clean;
            }
        }

        function changeTheme(theme) {
            if (theme === 'default') document.documentElement.removeAttribute('data-theme');
            else document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('launcher_theme', theme);
        }

        // Initialize saved details
        document.getElementById('display-username').innerText = localStorage.getItem('launcher_username') || "Player1";
        const savedTheme = localStorage.getItem('launcher_theme') || 'default';
        document.getElementById('theme-picker').value = savedTheme;
        changeTheme(savedTheme);
        renderGames();
    </script>
</body>
</html>
