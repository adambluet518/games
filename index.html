<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Block Dodge Coin Challenge</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;overflow:hidden}
#ui{position:fixed;top:0;left:0;right:0;background:#222;padding:8px;display:flex;gap:15px;flex-wrap:wrap;z-index:10}
canvas{display:block}
button{background:#4ea8de;border:none;color:#fff;padding:5px 10px;cursor:pointer}
#msg{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border:2px solid #4ea8de;
display:none;
text-align:center;
z-index:20;
}
</style>
</head>
<body>

<div id="ui">
<div>🪙 Coins: <span id="coins">0</span></div>
<div>⏱ Time: <span id="time">0</span>s</div>
<div>🏆 Best: <span id="best">0</span>s</div>
<button onclick="start()">Play</button>
<button onclick="location.href='index.html'">Launcher</button>
</div>

<canvas id="c"></canvas>

<div id="msg">
<h2>Game Over</h2>
<p id="stats"></p>
<button onclick="hideMsg();start()">Play Again</button>
</div>

<script>
const cv=document.getElementById("c");
const ctx=cv.getContext("2d");

function resize(){
cv.width=innerWidth;
cv.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let launcher=JSON.parse(localStorage.getItem("adamLauncherSave")||"{}");

if(!launcher.coins) launcher.coins=0;
if(!launcher.unlockedGames) launcher.unlockedGames=["gm1.html"];

function saveLauncher(){
localStorage.setItem("adamLauncherSave",JSON.stringify(launcher));
}

const coinEl=document.getElementById("coins");
const bestEl=document.getElementById("best");
const timeEl=document.getElementById("time");

coinEl.textContent=launcher.coins;
bestEl.textContent=Math.floor(localStorage.bestDodge||0);

let p,blocks,time,lastCoin,running,best;

best=+localStorage.bestDodge||0;

const keys={};

onkeydown=e=>keys[e.key]=1;
onkeyup=e=>keys[e.key]=0;

function reset(){
p={
x:cv.width/2,
y:cv.height-60,
w:30,
h:30
};

blocks=[];
time=0;
lastCoin=0;
running=true;
}

function start(){
reset();
requestAnimationFrame(loop);
}

function addBlock(){
blocks.push({
x:Math.random()*(cv.width-40),
y:-40,
w:20+Math.random()*50,
h:20+Math.random()*50,
v:3+time/20+Math.random()*2
});
}

function awardCoin(){
launcher.coins++;
coinEl.textContent=launcher.coins;
saveLauncher();
}

function unlockSecret(){
if(!launcher.unlockedGames.includes("gm0.html")){
launcher.unlockedGames.push("gm0.html");
saveLauncher();
alert("🎁 Secret Game Unlocked!");
}
}

function endGame(){
running=false;

if(time>best){
best=time;
localStorage.bestDodge=best;
bestEl.textContent=Math.floor(best);
}

document.getElementById("stats").innerHTML=
"Survived "+Math.floor(time)+"s<br>Coins: "+launcher.coins;

document.getElementById("msg").style.display="block";
}

function hideMsg(){
document.getElementById("msg").style.display="none";
}

let spawn=0;
let last=performance.now();

function loop(now){

if(!running) return;

let dt=(now-last)/1000;
last=now;

time+=dt;

timeEl.textContent=Math.floor(time);

if(keys.a||keys.ArrowLeft) p.x-=350*dt;
if(keys.d||keys.ArrowRight) p.x+=350*dt;

if(p.x<0)p.x=0;
if(p.x+p.w>cv.width)p.x=cv.width-p.w;

spawn+=dt;

if(spawn>.35-Math.min(.25,time/200)){
spawn=0;
addBlock();
}

for(let i=blocks.length-1;i>=0;i--){

let b=blocks[i];

b.y+=b.v;

if(
p.x<b.x+b.w &&
p.x+p.w>b.x &&
p.y<b.y+b.h &&
p.y+p.h>b.y
){
endGame();
return;
}

if(b.y>cv.height+100){
blocks.splice(i,1);
}
}

if(time-lastCoin>=30){
lastCoin+=30;
awardCoin();
}

if(time>=180){
unlockSecret();
}

ctx.fillStyle="#111";
ctx.fillRect(0,0,cv.width,cv.height);

ctx.fillStyle="#4ea8de";
ctx.fillRect(p.x,p.y,p.w,p.h);

ctx.fillStyle="#ff5555";

for(let b of blocks){
ctx.fillRect(b.x,b.y,b.w,b.h);
}

requestAnimationFrame(loop);
}

ctx.fillStyle="#fff";
ctx.font="30px sans-serif";
ctx.fillText("Press Play",40,100);
</script>

</body>
</html>
