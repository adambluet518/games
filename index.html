<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Game Launcher</title>
  <link rel="icon" type="image/png" href="Game_launcher_favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: #0b0b0e;
      color: #eaeef2;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ---------- sidebar ---------- */
    .sidebar {
      width: 300px;
      min-width: 280px;
      background: #141418;
      border-right: 1px solid #2a2a30;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.6);
    }

    .sidebar-header {
      padding: 22px 16px 16px;
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4ea8de, #7b4cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      border-bottom: 1px solid #2a2a30;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.5px;
    }

    .sidebar-header span {
      background: none;
      -webkit-text-fill-color: #cbd5e1;
      font-size: 0.9rem;
      font-weight: 400;
      margin-left: auto;
      opacity: 0.7;
    }

    /* user card */
    .user-card {
      background: #1e1e26;
      margin: 12px 14px 8px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #2f2f38;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: inset 0 0 6px #00000040;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .user-row label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8d8d99;
      min-width: 60px;
    }

    .user-row input {
      background: #0f0f13;
      border: 1px solid #3a3a44;
      color: #e1e1e6;
      padding: 6px 12px;
      border-radius: 40px;
      flex: 1;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }

    .user-row input:focus {
      border-color: #4ea8de;
      box-shadow: 0 0 0 2px #4ea8de44;
    }

    .user-row .save-btn {
      background: #2b2b36;
      border: none;
      color: #cbd5e1;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.3px;
    }

    .user-row .save-btn:hover {
      background: #4ea8de;
      color: #0b0b0e;
    }

    .stats-mini {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #8d8d99;
      padding-top: 6px;
      border-top: 1px solid #2a2a30;
      margin-top: 2px;
    }

    .stats-mini span {
      background: #0f0f13;
      padding: 2px 12px;
      border-radius: 40px;
    }

    /* games list */
    .games-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 20px;
      scrollbar-width: thin;
      scrollbar-color: #2f2f38 transparent;
    }

    .games-list::-webkit-scrollbar {
      width: 4px;
    }
    .games-list::-webkit-scrollbar-thumb {
      background: #3d3d48;
      border-radius: 10px;
    }

    .game-btn {
      width: 100%;
      background: #1a1a22;
      border: 1px solid #282830;
      color: #e1e1e6;
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 14px;
      text-align: left;
      cursor: pointer;
      transition: 0.2s cubic-bezier(0.2, 0.9, 0.3, 1.2);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(2px);
      position: relative;
    }

    .game-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, #4ea8de10, #7b4cff10);
      opacity: 0;
      transition: 0.3s;
    }

    .game-btn:hover {
      background: #23232e;
      border-color: #4ea8de;
      transform: translateX(6px) scale(1.01);
      box-shadow: 0 6px 16px #00000050;
    }

    .game-btn:hover::after {
      opacity: 1;
    }

    .game-btn.active {
      background: #4ea8de;
      color: #0b0b0e;
      font-weight: 600;
      border-color: #7bc0f0;
      transform: translateX(8px);
      box-shadow: 0 8px 20px #4ea8de30;
    }

    .game-btn.active .game-genre {
      color: #0b0b0e;
      opacity: 0.8;
    }

    .game-genre {
      font-size: 0.65rem;
      color: #8d8d99;
      margin-top: 3px;
      letter-spacing: 0.2px;
    }

    .game-btn .play-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.3;
      font-size: 0.8rem;
    }

    .game-btn.active .play-icon {
      opacity: 0.8;
      color: #0b0b0e;
    }

    /* ---------- main content ---------- */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0a0a0e;
      position: relative;
    }

    #game-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #0a0a0e;
      display: none;
    }

    .placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #8d8d99;
      pointer-events: none;
    }

    .placeholder h2 {
      color: #e1e1e6;
      font-weight: 300;
      font-size: 2.4rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e1e1e6, #7b9cd6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .placeholder p {
      margin-top: 8px;
      opacity: 0.7;
    }

    /* music player bar */
    .music-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #14141c;
      backdrop-filter: blur(12px);
      border-top: 1px solid #2a2a30;
      padding: 6px 20px 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      z-index: 20;
      box-shadow: 0 -4px 20px #00000070;
    }

    .music-bar .track-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1 1 180px;
    }

    .music-bar .track-info .icon {
      font-size: 1.2rem;
    }

    .music-bar .track-info .name {
      font-weight: 500;
      font-size: 0.85rem;
      color: #cbd5e1;
    }

    .music-bar .track-info .name small {
      font-weight: 300;
      color: #8d8d99;
      font-size: 0.7rem;
      margin-left: 6px;
    }

    .music-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .music-controls button {
      background: #26262e;
      border: none;
      color: #e1e1e6;
      width: 34px;
      height: 34px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .music-controls button:hover {
      background: #3e3e4a;
      transform: scale(1.05);
    }

    .music-controls .play-btn {
      background: #4ea8de;
      color: #0b0b0e;
      width: 40px;
    }

    .music-controls .play-btn:hover {
      background: #7bc0f0;
    }

    .music-bar .volume-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 1 100px;
    }

    .music-bar input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      background: #2f2f38;
      border-radius: 10px;
      outline: none;
    }

    .music-bar input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #4ea8de;
      border-radius: 20px;
      cursor: pointer;
    }

    .playtime-badge {
      background: #1e1e28;
      padding: 2px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      color: #aab;
      border: 1px solid #2f2f3a;
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .sidebar {
        width: 240px;
        min-width: 200px;
      }
      .music-bar {
        flex-wrap: wrap;
        gap: 6px;
        padding: 6px 12px;
      }
      .user-row input {
        min-width: 70px;
      }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      🕹️ launcher
      <span>· play</span>
    </div>

    <!-- user card -->
    <div class="user-card" id="userCard">
      <div class="user-row">
        <label>👤 user</label>
        <input type="text" id="usernameInput" placeholder="name" value="Player1">
        <button class="save-btn" id="saveUserBtn">save</button>
      </div>
      <div class="stats-mini">
        <span id="playtimeDisplay">⏱️ 1m 21s</span>
        <span id="sessionDisplay">📊 76s</span>
      </div>
    </div>

    <div class="games-list" id="gamesList">
      <button class="game-btn" data-game="gm1.html"><span>Block Blast</span><span class="game-genre">Puzzle</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm2.html"><span>Cookie Clicker</span><span class="game-genre">Idle / Clicker</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm3.html"><span>Depths of Aeloria</span><span class="game-genre">Text-Based RPG</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm4.html"><span>Wordstorm</span><span class="game-genre">Word / Puzzle</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm5.html"><span>Paint Editor</span><span class="game-genre">Utility / Art</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm6.html"><span>Dragon Quest</span><span class="game-genre">2D Platformer</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm7.html"><span>AdamCraft</span><span class="game-genre">2D Paper Minecraft</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm8.html"><span>Code IDE</span><span class="game-genre">Utility / Dev</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm9.html"><span>Neon Drift</span><span class="game-genre">Sandbox Racer</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm10.html"><span>The Veil</span><span class="game-genre">3D FPS</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm11.html"><span>Street Racer</span><span class="game-genre">3D Racing</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm12.html"><span>3D Dino Game</span><span class="game-genre">3D Endless Runner</span><span class="play-icon">▶</span></button>
      <button class="game-btn" data-game="gm13.html"><span>Space Shooter</span><span class="game-genre">3D Space Shooter</span><span class="play-icon">▶</span></button>
      <button class="game-btn active" data-game="gm14.html"><span>Minecraft Clone</span><span class="game-genre">3D Sandbox</span><span class="play-icon">▶</span></button>
    </div>
  </div>

  <div class="main-content">
    <div class="placeholder" id="placeholderText" style="display: none;">
      <h2>🎯 select a game</h2>
      <p>launcher · music · profile · playtime</p>
    </div>
    <iframe id="game-frame" src="gm14.html" allow="fullscreen; autoplay; pointer-lock" style="display: block;"></iframe>

    <!-- music bar -->
    <div class="music-bar" id="musicBar">
      <div class="track-info">
        <span class="icon">🎵</span>
        <span class="name">launcher_music.ogg <small>· ambient</small></span>
      </div>
      <div class="music-controls">
        <button id="prevTrack" disabled="">⏮</button>
        <button class="play-btn" id="playPauseBtn">▶</button>
        <button id="nextTrack" disabled="">⏭</button>
      </div>
      <div class="volume-wrap">
        <span>🔊</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.6">
      </div>
      <span class="playtime-badge" id="musicTimeDisplay">0:24</span>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ----- DOM refs -----
      const gameFrame = document.getElementById('game-frame');
      const placeholder = document.getElementById('placeholderText');
      const gameBtns = document.querySelectorAll('.game-btn');
      const usernameInput = document.getElementById('usernameInput');
      const saveUserBtn = document.getElementById('saveUserBtn');
      const playtimeDisplay = document.getElementById('playtimeDisplay');
      const sessionDisplay = document.getElementById('sessionDisplay');

      // ----- music -----
      const audio = new Audio('launcher_music.ogg');
      audio.loop = true;
      audio.volume = 0.6;
      const playPauseBtn = document.getElementById('playPauseBtn');
      const volumeSlider = document.getElementById('volumeSlider');
      const musicTimeDisplay = document.getElementById('musicTimeDisplay');

      // ----- state -----
      let currentGame = null;
      let totalPlaytimeSeconds = 0;
      let sessionStart = Date.now();
      let sessionSeconds = 0;
      let playtimeInterval = null;
      let musicInterval = null;

      // ----- load stored data -----
      function loadStoredData() {
        try {
          const stored = localStorage.getItem('launcherData');
          if (stored) {
            const data = JSON.parse(stored);
            if (data.username) usernameInput.value = data.username;
            if (data.totalPlaytime) totalPlaytimeSeconds = data.totalPlaytime;
            if (data.volume !== undefined) {
              audio.volume = data.volume;
              volumeSlider.value = data.volume;
            }
            if (data.musicPlaying !== undefined) {
              if (data.musicPlaying) {
                audio.play().catch(() => {});
                playPauseBtn.textContent = '⏸';
              } else {
                audio.pause();
                playPauseBtn.textContent = '▶';
              }
            }
            updatePlaytimeDisplay();
          }
        } catch (e) { /* ignore */ }
      }

      function saveStoredData(extra = {}) {
        try {
          const data = {
            username: usernameInput.value,
            totalPlaytime: totalPlaytimeSeconds,
            volume: audio.volume,
            musicPlaying: !audio.paused,
            ...extra
          };
          localStorage.setItem('launcherData', JSON.stringify(data));
        } catch (e) { /* ignore */ }
      }

      // ----- update playtime UI -----
      function updatePlaytimeDisplay() {
        const mins = Math.floor(totalPlaytimeSeconds / 60);
        const secs = Math.floor(totalPlaytimeSeconds % 60);
        playtimeDisplay.textContent = `⏱️ ${mins}m ${secs}s`;
        const s = Math.floor(sessionSeconds);
        sessionDisplay.textContent = `📊 ${s}s`;
      }

      // ----- track playtime -----
      function startPlaytimeTracking() {
        if (playtimeInterval) clearInterval(playtimeInterval);
        sessionStart = Date.now();
        sessionSeconds = 0;
        playtimeInterval = setInterval(() => {
          const now = Date.now();
          const delta = (now - sessionStart) / 1000;
          sessionSeconds = delta;
          totalPlaytimeSeconds += 1;
          updatePlaytimeDisplay();
          if (Math.floor(totalPlaytimeSeconds) % 5 === 0) {
            saveStoredData();
          }
        }, 1000);
      }

      window.addEventListener('beforeunload', function() {
        if (playtimeInterval) clearInterval(playtimeInterval);
        saveStoredData();
      });

      // ----- load game -----
      function loadGame(gameUrl, btnElement) {
        if (!gameUrl) return;
        currentGame = gameUrl;
        gameFrame.src = gameUrl;
        gameFrame.style.display = 'block';
        placeholder.style.display = 'none';

        gameBtns.forEach(b => b.classList.remove('active'));
        if (btnElement) btnElement.classList.add('active');

        if (!playtimeInterval) startPlaytimeTracking();
        saveStoredData();
      }

      // ----- event listeners -----
      gameBtns.forEach(btn => {
        btn.addEventListener('click', function(e) {
          const game = this.dataset.game;
          if (game) loadGame(game, this);
        });
      });

      saveUserBtn.addEventListener('click', function() {
        const name = usernameInput.value.trim() || 'Player1';
        usernameInput.value = name;
        saveStoredData();
        this.textContent = '✔ saved';
        setTimeout(() => { this.textContent = 'save'; }, 800);
      });

      usernameInput.addEventListener('change', function() {
        saveStoredData();
      });

      // ----- music controls -----
      function updateMusicTimeDisplay() {
        if (audio.duration) {
          const mins = Math.floor(audio.currentTime / 60);
          const secs = Math.floor(audio.currentTime % 60);
          musicTimeDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        } else {
          musicTimeDisplay.textContent = '0:00';
        }
      }

      playPauseBtn.addEventListener('click', function() {
        if (audio.paused) {
          audio.play().catch(() => {});
          this.textContent = '⏸';
        } else {
          audio.pause();
          this.textContent = '▶';
        }
        saveStoredData();
      });

      volumeSlider.addEventListener('input', function() {
        audio.volume = parseFloat(this.value);
        saveStoredData();
      });

      audio.addEventListener('timeupdate', function() {
        if (!musicInterval) {
          musicInterval = setInterval(updateMusicTimeDisplay, 500);
        }
        updateMusicTimeDisplay();
      });

      audio.addEventListener('ended', function() {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      });

      // ---- init ----
      loadStoredData();
      if (!audio.paused) {
        playPauseBtn.textContent = '⏸';
      } else {
        playPauseBtn.textContent = '▶';
      }
      startPlaytimeTracking();

      gameFrame.addEventListener('load', function() {
        // keep tracking
      });

      console.log('🚀 launcher · music + profile + playtime');
    })();
  </script>

</body></html>
