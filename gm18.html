<!-- Awatch v4 - Hybrid: localStorage accounts + jsonbin video sync -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awatch – Your Video Platform</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:white; }
    header { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:#202020; position:sticky; top:0; z-index:100; }
    .logo { font-size:1.8rem; font-weight:bold; color:#ff4d4d; } .logo span { color:white; }
    .version-badge { background:#4ea8de33; color:#4ea8de; padding:2px 8px; border-radius:10px; font-size:0.6rem; font-weight:bold; margin-left:6px; }
    .user-actions { display:flex; gap:10px; align-items:center; }
    .btn { background:#ff4d4d; border:none; color:white; padding:8px 16px; border-radius:20px; cursor:pointer; font-weight:bold; }
    .btn:hover { background:#e60000; }
    .btn-outline { background:transparent; border:1px solid #ff4d4d; color:#ff4d4d; }
    .btn-outline:hover { background:rgba(255,77,77,0.1); }
    .videos-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:20px; padding:20px; }
    .video-card { background:#272727; border-radius:12px; overflow:hidden; cursor:pointer; transition:transform 0.2s; }
    .video-card:hover { transform:scale(1.02); }
    .thumbnail { width:100%; height:180px; background:#111; display:flex; align-items:center; justify-content:center; font-size:3rem; color:#666; }
    .video-info { padding:10px; } .video-title { font-weight:bold; margin-bottom:5px; } .video-meta { font-size:0.85rem; color:#aaa; }
    .upload-area { display:flex; justify-content:center; margin:20px; flex-direction:column; align-items:center; gap:10px; }
    progress { width:300px; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:200; }
    .modal.active { display:flex; }
    .modal-content { background:#202020; padding:30px; border-radius:15px; width:90%; max-width:400px; text-align:center; }
    .modal-content input { width:100%; padding:12px; margin:10px 0; border-radius:25px; border:1px solid #444; background:#121212; color:white; font-size:1rem; }
    .modal-content h2 { margin-bottom:15px; } .close { float:right; cursor:pointer; font-size:1.5rem; }
    .player-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:300; justify-content:center; align-items:center; flex-direction:column; }
    .player-overlay.active { display:flex; }
    .player-overlay video { max-width:90%; max-height:80%; border-radius:10px; }
    .close-player { position:absolute; top:20px; right:30px; font-size:2rem; cursor:pointer; }
    .user-greeting { margin-right:10px; }
    .upload-status { color:#4ea8de; font-size:0.9rem; }
    .footer-note { text-align:center; padding:10px; color:#555; font-size:0.7rem; border-top:1px solid #1a1a1a; margin-top:20px; }
    .info-notification { background:#1a1a2e; border:1px solid #4ea8de; color:#cbd5e1; padding:12px 16px; border-radius:10px; margin:10px 20px; font-size:0.8rem; display:flex; align-items:center; gap:10px; }
    .info-notification .info-icon { font-size:1.2rem; }
    .info-notification button { background:#4ea8de; border:none; color:white; padding:4px 10px; border-radius:15px; cursor:pointer; font-size:0.7rem; margin-left:auto; white-space:nowrap; }
    .sync-status { text-align:center; font-size:0.7rem; color:#4ea8de; padding:4px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">A<span>watch</span><span class="version-badge">v4 sync</span></div>
    <div class="user-actions" id="userActions"></div>
  </header>

  <!-- Info notification -->
  <div class="info-notification" id="infoNotification">
    <span class="info-icon">🌐</span>
    <span><strong>Hybrid Mode:</strong> Accounts are per-device, but all videos sync across devices!</span>
    <button id="dismissInfo">Got it</button>
  </div>

  <div class="upload-area" id="uploadArea" style="display:none;">
    <input type="file" id="videoFile" accept="video/*" style="display:none;">
    <button class="btn" id="uploadBtn">📤 Upload Video</button>
    <progress id="uploadProgress" value="0" max="100" style="display:none;"></progress>
    <span class="upload-status" id="uploadStatus"></span>
  </div>

  <div class="videos-grid" id="videosGrid"></div>
  <div class="sync-status" id="syncStatus">🔄 Syncing videos...</div>
  <div class="footer-note">
    💾 Accounts local · 🌐 Videos synced via jsonbin · <span id="videoCount">0 videos</span>
  </div>

  <!-- Auth Modal -->
  <div class="modal" id="authModal">
    <div class="modal-content">
      <span class="close" id="closeAuth">&times;</span>
      <h2 id="authTitle">Sign In to Awatch</h2>
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="password" id="passwordInput" placeholder="Password">
      <button class="btn" id="authActionBtn">Sign In</button>
      <p style="margin-top:15px;"><a href="#" id="toggleAuth">Don't have an account? Sign Up</a></p>
      <p id="authError" style="color:#ff4d4d; margin-top:10px;"></p>
    </div>
  </div>

  <!-- Video Player Overlay -->
  <div class="player-overlay" id="playerOverlay">
    <span class="close-player" id="closePlayer">&times;</span>
    <video id="videoPlayer" controls autoplay></video>
  </div>

  <script>
    console.log('🎬 Awatch v4 Hybrid - localStorage + jsonbin sync');

    // ── CONFIGURATION ──
    // This is a PUBLIC jsonbin.io bin - anyone can read/write
    // If it gets too full or breaks, create a new one at https://jsonbin.io
    const JSONBIN_API_KEY = '$2a$10$YOUR_API_KEY_HERE'; // Replace with your free API key from jsonbin.io
    const JSONBIN_BIN_ID = '67a5c8e4ad19ca34f8fc1f1e';
    const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
    const JSONBIN_HEADERS = {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_API_KEY
    };

    // ── Storage keys ──
    const USERS_KEY = 'awatch_users';
    const CURRENT_USER_KEY = 'awatch_current_user';
    const INFO_DISMISSED_KEY = 'awatch_info_dismissed';

    // UI elements
    const userActionsDiv = document.getElementById('userActions');
    const videosGrid = document.getElementById('videosGrid');
    const uploadArea = document.getElementById('uploadArea');
    const videoFileInput = document.getElementById('videoFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadProgress = document.getElementById('uploadProgress');
    const uploadStatus = document.getElementById('uploadStatus');
    const authModal = document.getElementById('authModal');
    const closeAuth = document.getElementById('closeAuth');
    const authTitle = document.getElementById('authTitle');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const authActionBtn = document.getElementById('authActionBtn');
    const toggleAuth = document.getElementById('toggleAuth');
    const authError = document.getElementById('authError');
    const playerOverlay = document.getElementById('playerOverlay');
    const videoPlayer = document.getElementById('videoPlayer');
    const closePlayer = document.getElementById('closePlayer');
    const infoNotification = document.getElementById('infoNotification');
    const dismissInfo = document.getElementById('dismissInfo');
    const syncStatus = document.getElementById('syncStatus');
    const videoCount = document.getElementById('videoCount');

    let isSignUp = false;
    let currentUser = null;
    let allVideos = [];

    // ── Info notification ──
    if (localStorage.getItem(INFO_DISMISSED_KEY) === 'true') {
      infoNotification.style.display = 'none';
    }
    dismissInfo.addEventListener('click', () => {
      infoNotification.style.display = 'none';
      localStorage.setItem(INFO_DISMISSED_KEY, 'true');
    });

    // ── Load stored users ──
    function getUsers() {
      try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; }
      catch(e) { return {}; }
    }

    function saveUsers(users) {
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    // ── Auth modal logic ──
    function updateAuthModal() {
      if (isSignUp) {
        authTitle.textContent = 'Create Account';
        authActionBtn.textContent = 'Sign Up';
        toggleAuth.innerHTML = 'Already have an account? <a href="#">Sign In</a>';
      } else {
        authTitle.textContent = 'Sign In to Awatch';
        authActionBtn.textContent = 'Sign In';
        toggleAuth.innerHTML = 'Don\'t have an account? <a href="#">Sign Up</a>';
      }
      authError.textContent = '';
    }

    toggleAuth.addEventListener('click', (e) => {
      e.preventDefault();
      isSignUp = !isSignUp;
      updateAuthModal();
    });

    closeAuth.addEventListener('click', () => authModal.classList.remove('active'));

    authActionBtn.addEventListener('click', () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (!username || !password) {
        authError.textContent = 'Please fill in all fields.';
        return;
      }
      const users = getUsers();
      if (isSignUp) {
        if (users[username]) {
          authError.textContent = 'Username already exists!';
          return;
        }
        users[username] = { password, createdAt: Date.now() };
        saveUsers(users);
        localStorage.setItem(CURRENT_USER_KEY, username);
        authModal.classList.remove('active');
        loginSuccess(username);
      } else {
        if (!users[username]) {
          authError.textContent = 'User not found!';
          return;
        }
        if (users[username].password !== password) {
          authError.textContent = 'Wrong password!';
          return;
        }
        localStorage.setItem(CURRENT_USER_KEY, username);
        authModal.classList.remove('active');
        loginSuccess(username);
      }
    });

    // ── UI after login ──
    function loginSuccess(username) {
      currentUser = username;
      renderLoggedInUI();
      loadVideosFromBin();
    }

    function renderLoggedInUI() {
      userActionsDiv.innerHTML = `
        <span class="user-greeting">👤 ${escapeHtml(currentUser)}</span>
        <button class="btn btn-outline" id="logoutBtn">Logout</button>
      `;
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem(CURRENT_USER_KEY);
        currentUser = null;
        renderLoggedOutUI();
        loadVideosFromBin();
      });
      uploadArea.style.display = 'flex';
    }

    function renderLoggedOutUI() {
      userActionsDiv.innerHTML = `<button class="btn" id="signInBtn">Sign In</button>`;
      document.getElementById('signInBtn').addEventListener('click', () => {
        isSignUp = false;
        updateAuthModal();
        authModal.classList.add('active');
      });
      uploadArea.style.display = 'none';
    }

    // ── Load videos from jsonbin ──
    async function loadVideosFromBin() {
      syncStatus.textContent = '🔄 Syncing videos...';
      videosGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">Loading videos...</p>';
      
      try {
        const response = await fetch(`${JSONBIN_URL}/latest`, {
          headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        
        if (!response.ok) throw new Error('Failed to load');
        
        const data = await response.json();
        allVideos = data.record?.videos || [];
        
        syncStatus.textContent = '✅ Synced';
        setTimeout(() => { syncStatus.textContent = ''; }, 2000);
        
        renderVideoGrid();
      } catch (err) {
        console.error('Load error:', err);
        syncStatus.textContent = '⚠️ Offline mode - showing cached videos';
        // Fall back to cached videos
        const cached = localStorage.getItem('awatch_video_cache');
        if (cached) {
          allVideos = JSON.parse(cached);
          renderVideoGrid();
        } else {
          videosGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#aaa;">Could not load videos. Check your connection.</p>';
        }
      }
    }

    function renderVideoGrid() {
      videosGrid.innerHTML = '';
      
      if (allVideos.length === 0) {
        videosGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#aaa;">No videos yet. Upload the first one!</p>';
        videoCount.textContent = '0 videos';
        return;
      }

      // Sort newest first
      allVideos.sort((a, b) => b.uploadedAt - a.uploadedAt);
      
      allVideos.forEach(data => {
        addVideoCard(data);
      });
      
      videoCount.textContent = `${allVideos.length} video${allVideos.length > 1 ? 's' : ''}`;
    }

    function addVideoCard(data) {
      const existing = videosGrid.querySelector(`[data-url="${data.url.replace(/"/g, '&quot;')}"]`);
      if (existing) return;

      const card = document.createElement('div');
      card.className = 'video-card';
      card.setAttribute('data-url', data.url);
      card.innerHTML = `
        <div class="thumbnail">▶️</div>
        <div class="video-info">
          <div class="video-title">${escapeHtml(data.title)}</div>
          <div class="video-meta">${escapeHtml(data.uploader || 'Unknown')} • ${timeAgo(data.uploadedAt)}</div>
        </div>
      `;
      card.addEventListener('click', () => playVideo(data.url));
      videosGrid.appendChild(card);
    }

    // ── Upload to tmpfiles.org + save to jsonbin ──
    uploadBtn.addEventListener('click', () => videoFileInput.click());

    videoFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (!currentUser) {
        alert('Please sign in first.');
        return;
      }

      if (file.size > 100 * 1024 * 1024) {
        alert('File too large! Max 100MB for free uploads.');
        return;
      }

      uploadProgress.style.display = 'block';
      uploadProgress.value = 0;
      uploadStatus.textContent = 'Uploading to tmpfiles.org...';

      try {
        // Step 1: Upload video file
        const formData = new FormData();
        formData.append('file', file);
        
        const uploadResponse = await fetch('https://tmpfiles.org/api/v1/upload', {
          method: 'POST',
          body: formData
        });

        if (!uploadResponse.ok) throw new Error('Upload failed: ' + uploadResponse.status);
        
        const uploadData = await uploadResponse.json();
        const fileUrl = uploadData.data.url.replace('https://tmpfiles.org/', 'https://tmpfiles.org/dl/');
        
        uploadStatus.textContent = 'Syncing to jsonbin...';

        // Step 2: Add to video list
        const newVideo = {
          title: file.name.replace(/\.[^/.]+$/, ""),
          url: fileUrl,
          uploader: currentUser,
          uploadedAt: Date.now()
        };

        // Step 3: Get current videos from bin
        const binResponse = await fetch(`${JSONBIN_URL}/latest`, {
          headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        const binData = await binResponse.json();
        const currentVideos = binData.record?.videos || [];
        currentVideos.push(newVideo);

        // Step 4: Update bin
        const updateResponse = await fetch(JSONBIN_URL, {
          method: 'PUT',
          headers: JSONBIN_HEADERS,
          body: JSON.stringify({ videos: currentVideos })
        });

        if (!updateResponse.ok) throw new Error('Sync failed: ' + updateResponse.status);

        // Step 5: Cache locally
        allVideos = currentVideos;
        localStorage.setItem('awatch_video_cache', JSON.stringify(allVideos));

        uploadProgress.style.display = 'none';
        uploadStatus.textContent = '✅ Upload complete!';
        videoFileInput.value = '';
        
        setTimeout(() => { uploadStatus.textContent = ''; }, 3000);
        
        renderVideoGrid();

      } catch (err) {
        console.error('Upload error:', err);
        uploadStatus.textContent = '❌ Upload failed: ' + err.message;
        uploadProgress.style.display = 'none';
      }
    });

    function playVideo(url) {
      videoPlayer.src = url;
      playerOverlay.classList.add('active');
    }

    closePlayer.addEventListener('click', () => {
      videoPlayer.pause();
      videoPlayer.src = '';
      playerOverlay.classList.remove('active');
    });

    // ── Helpers ──
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function timeAgo(timestamp) {
      if (!timestamp) return 'just now';
      const diff = (Date.now() - timestamp) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      return Math.floor(diff/86400) + 'd ago';
    }

    // Close modals on outside click
    window.addEventListener('click', (e) => {
      if (e.target === authModal) authModal.classList.remove('active');
      if (e.target === playerOverlay) {
        videoPlayer.pause();
        videoPlayer.src = '';
        playerOverlay.classList.remove('active');
      }
    });

    // ── Init ──
    const storedUser = localStorage.getItem(CURRENT_USER_KEY);
    if (storedUser && getUsers()[storedUser]) {
      loginSuccess(storedUser);
    } else {
      renderLoggedOutUI();
      loadVideosFromBin();
    }

    // Auto-refresh videos every 30 seconds
    setInterval(() => {
      if (allVideos.length > 0) {
        loadVideosFromBin();
      }
    }, 30000);
  </script>
</body>
</html>
