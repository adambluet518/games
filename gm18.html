<!-- Awatch v5.2 - Admin delete + username protection -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awatch – Your Video Platform</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:white; }
    header { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:#202020; position:sticky; top:0; z-index:100; }
    .logo { font-size:1.8rem; font-weight:bold; color:#ff4d4d; } .logo span { color:white; }
    .version-badge { background:#4ea8de33; color:#4ea8de; padding:2px 8px; border-radius:10px; font-size:0.6rem; font-weight:bold; margin-left:6px; }
    .user-actions { display:flex; gap:10px; align-items:center; }
    .btn { background:#ff4d4d; border:none; color:white; padding:8px 16px; border-radius:20px; cursor:pointer; font-weight:bold; }
    .btn:hover { background:#e60000; }
    .btn-outline { background:transparent; border:1px solid #ff4d4d; color:#ff4d4d; }
    .btn-outline:hover { background:rgba(255,77,77,0.1); }
    .videos-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:20px; padding:20px; }
    .video-card { background:#272727; border-radius:12px; overflow:hidden; cursor:pointer; transition:transform 0.2s; position:relative; }
    .video-card:hover { transform:scale(1.02); }
    .thumbnail { width:100%; height:180px; background:#111; display:flex; align-items:center; justify-content:center; font-size:3rem; color:#666; position:relative; }
    .thumbnail .view-count { position:absolute; bottom:8px; right:10px; background:rgba(0,0,0,0.8); padding:2px 8px; border-radius:10px; font-size:0.65rem; color:#ccc; }
    .video-info { padding:10px; } .video-title { font-weight:bold; margin-bottom:5px; } .video-meta { font-size:0.85rem; color:#aaa; }
    .video-actions { display:flex; gap:8px; margin-top:8px; align-items:center; flex-wrap:wrap; }
    .vote-btn { background:#333; border:none; color:white; padding:5px 12px; border-radius:20px; cursor:pointer; font-size:0.8rem; transition:0.2s; display:flex; align-items:center; gap:4px; }
    .vote-btn:hover { background:#444; }
    .vote-btn.voted-like { background:#2d8a4e; border:1px solid #3cb371; }
    .vote-btn.voted-dislike { background:#8a2d2d; border:1px solid #c0392b; }
    .delete-btn { background:#8a2d2d; border:none; color:#ff6666; padding:5px 12px; border-radius:20px; cursor:pointer; font-size:0.8rem; transition:0.2s; margin-left:auto; }
    .delete-btn:hover { background:#c0392b; color:white; }
    .admin-badge { background:#ff4d4d; color:white; padding:1px 6px; border-radius:8px; font-size:0.55rem; margin-left:4px; }
    .upload-area { display:flex; justify-content:center; margin:20px; flex-direction:column; align-items:center; gap:10px; }
    progress { width:300px; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:200; }
    .modal.active { display:flex; }
    .modal-content { background:#202020; padding:30px; border-radius:15px; width:90%; max-width:400px; text-align:center; }
    .modal-content input { width:100%; padding:12px; margin:10px 0; border-radius:25px; border:1px solid #444; background:#121212; color:white; font-size:1rem; }
    .modal-content h2 { margin-bottom:15px; } .close { float:right; cursor:pointer; font-size:1.5rem; }
    .player-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:300; justify-content:center; align-items:center; flex-direction:column; }
    .player-overlay.active { display:flex; }
    .player-overlay video { max-width:90%; max-height:80%; border-radius:10px; }
    .close-player { position:absolute; top:20px; right:30px; font-size:2rem; cursor:pointer; }
    .user-greeting { margin-right:10px; }
    .upload-status { color:#4ea8de; font-size:0.9rem; }
    .footer-note { text-align:center; padding:10px; color:#555; font-size:0.7rem; border-top:1px solid #1a1a1a; margin-top:20px; }
    .info-notification { background:#1a1a2e; border:1px solid #4ea8de; color:#cbd5e1; padding:12px 16px; border-radius:10px; margin:10px 20px; font-size:0.8rem; display:flex; align-items:center; gap:10px; }
    .info-notification .info-icon { font-size:1.2rem; }
    .info-notification button { background:#4ea8de; border:none; color:white; padding:4px 10px; border-radius:15px; cursor:pointer; font-size:0.7rem; margin-left:auto; white-space:nowrap; }
    .sync-status { text-align:center; font-size:0.7rem; color:#4ea8de; padding:4px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">A<span>watch</span><span class="version-badge">v5.2</span></div>
    <div class="user-actions" id="userActions"></div>
  </header>

  <div class="info-notification" id="infoNotification">
    <span class="info-icon">🌐</span>
    <span><strong>Hybrid Mode:</strong> Accounts per-device · Videos sync across devices · Admin controls active</span>
    <button id="dismissInfo">Got it</button>
  </div>

  <div class="upload-area" id="uploadArea" style="display:none;">
    <input type="file" id="videoFile" accept="video/*" style="display:none;">
    <button class="btn" id="uploadBtn">📤 Upload Video</button>
    <progress id="uploadProgress" value="0" max="100" style="display:none;"></progress>
    <span class="upload-status" id="uploadStatus"></span>
  </div>

  <div class="videos-grid" id="videosGrid"></div>
  <div class="sync-status" id="syncStatus">🔄 Syncing videos...</div>
  <div class="footer-note">
    💾 Accounts local · 🌐 Videos synced · 🛡️ Admin: adamblue · <span id="videoCount">0 videos</span>
  </div>

  <div class="modal" id="authModal">
    <div class="modal-content">
      <span class="close" id="closeAuth">&times;</span>
      <h2 id="authTitle">Sign In to Awatch</h2>
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="password" id="passwordInput" placeholder="Password">
      <button class="btn" id="authActionBtn">Sign In</button>
      <p style="margin-top:15px;"><a href="#" id="toggleAuth">Don't have an account? Sign Up</a></p>
      <p id="authError" style="color:#ff4d4d; margin-top:10px;"></p>
    </div>
  </div>

  <div class="player-overlay" id="playerOverlay">
    <span class="close-player" id="closePlayer">&times;</span>
    <video id="videoPlayer" controls autoplay></video>
  </div>

  <script>
    console.log('🎬 Awatch v5.2 - Admin delete + username protection');

    const ADMIN_USERNAME = 'adamblue';
    const JSONBIN_API_KEY = '$2a$10$s1NWFEk6L07QrlUn3r278uXEmk1d7l7HJ1gLWiYp0CfUkecbXAu6S';
    const JSONBIN_BIN_ID = '6a4575e4da38895dfe1e3d83';
    const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
    const JSONBIN_HEADERS = { 'Content-Type':'application/json', 'X-Master-Key':JSONBIN_API_KEY };
    const USERS_KEY = 'awatch_users';
    const CURRENT_USER_KEY = 'awatch_current_user';
    const INFO_DISMISSED_KEY = 'awatch_info_dismissed';
    const USER_VOTES_KEY = 'awatch_user_votes';

    const userActionsDiv = document.getElementById('userActions');
    const videosGrid = document.getElementById('videosGrid');
    const uploadArea = document.getElementById('uploadArea');
    const videoFileInput = document.getElementById('videoFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadProgress = document.getElementById('uploadProgress');
    const uploadStatus = document.getElementById('uploadStatus');
    const authModal = document.getElementById('authModal');
    const closeAuth = document.getElementById('closeAuth');
    const authTitle = document.getElementById('authTitle');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const authActionBtn = document.getElementById('authActionBtn');
    const toggleAuth = document.getElementById('toggleAuth');
    const authError = document.getElementById('authError');
    const playerOverlay = document.getElementById('playerOverlay');
    const videoPlayer = document.getElementById('videoPlayer');
    const closePlayer = document.getElementById('closePlayer');
    const infoNotification = document.getElementById('infoNotification');
    const dismissInfo = document.getElementById('dismissInfo');
    const syncStatus = document.getElementById('syncStatus');
    const videoCount = document.getElementById('videoCount');

    let isSignUp = false;
    let currentUser = null;
    let allVideos = [];
    let isAdmin = false;

    if (localStorage.getItem(INFO_DISMISSED_KEY) === 'true') infoNotification.style.display = 'none';
    dismissInfo.addEventListener('click', () => { infoNotification.style.display = 'none'; localStorage.setItem(INFO_DISMISSED_KEY, 'true'); });

    function getUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch(e) { return {}; } }
    function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
    function getUserVotes() { try { return JSON.parse(localStorage.getItem(USER_VOTES_KEY)) || {}; } catch(e) { return {}; } }
    function saveUserVotes(votes) { localStorage.setItem(USER_VOTES_KEY, JSON.stringify(votes)); }

    function updateAuthModal() {
      if (isSignUp) {
        authTitle.textContent = 'Create Account';
        authActionBtn.textContent = 'Sign Up';
        toggleAuth.innerHTML = 'Already have an account? <a href="#">Sign In</a>';
      } else {
        authTitle.textContent = 'Sign In to Awatch';
        authActionBtn.textContent = 'Sign In';
        toggleAuth.innerHTML = 'Don\'t have an account? <a href="#">Sign Up</a>';
      }
      authError.textContent = '';
    }

    toggleAuth.addEventListener('click', (e) => { e.preventDefault(); isSignUp = !isSignUp; updateAuthModal(); });
    closeAuth.addEventListener('click', () => authModal.classList.remove('active'));

    // Username protection: Check if username exists in the bin (global check)
    async function isUsernameTakenGlobally(username) {
      try {
        const binId = localStorage.getItem('awatch_bin_id') || JSONBIN_BIN_ID;
        const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
        if (!response.ok) return false;
        const data = await response.json();
        const videos = data.record?.videos || [];
        // Check if any video was uploaded by this username
        return videos.some(v => v.uploader && v.uploader.toLowerCase() === username.toLowerCase());
      } catch(e) { return false; }
    }

    authActionBtn.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (!username || !password) { authError.textContent = 'Please fill in all fields.'; return; }
      
      const users = getUsers();
      
      if (isSignUp) {
        // Local check
        if (users[username]) { authError.textContent = 'Username already exists on this device!'; return; }
        
        // Admin protection: no one else can be adamblue (case insensitive)
        if (username.toLowerCase() === ADMIN_USERNAME.toLowerCase() && username !== ADMIN_USERNAME) {
          authError.textContent = 'Username reserved. Choose another.'; return;
        }
        
        // Prevent registering as admin if not the original
        if (username.toLowerCase() === ADMIN_USERNAME.toLowerCase()) {
          // Check if admin account already exists locally
          if (users[ADMIN_USERNAME]) {
            authError.textContent = 'Admin account already exists on this device. Sign in instead.';
            return;
          }
        }
        
        users[username] = { password, createdAt: Date.now() };
        saveUsers(users);
        localStorage.setItem(CURRENT_USER_KEY, username);
        authModal.classList.remove('active');
        loginSuccess(username);
      } else {
        if (!users[username]) { authError.textContent = 'User not found on this device!'; return; }
        if (users[username].password !== password) { authError.textContent = 'Wrong password!'; return; }
        localStorage.setItem(CURRENT_USER_KEY, username);
        authModal.classList.remove('active');
        loginSuccess(username);
      }
    });

    function loginSuccess(username) { 
      currentUser = username; 
      isAdmin = (username === ADMIN_USERNAME);
      renderLoggedInUI(); 
      loadVideosFromBin(); 
    }

    function renderLoggedInUI() {
      const adminBadge = isAdmin ? '<span class="admin-badge">ADMIN</span>' : '';
      userActionsDiv.innerHTML = `<span class="user-greeting">👤 ${escapeHtml(currentUser)}${adminBadge}</span><button class="btn btn-outline" id="logoutBtn">Logout</button>`;
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem(CURRENT_USER_KEY); currentUser = null; isAdmin = false; renderLoggedOutUI(); loadVideosFromBin();
      });
      uploadArea.style.display = 'flex';
    }

    function renderLoggedOutUI() {
      userActionsDiv.innerHTML = `<button class="btn" id="signInBtn">Sign In</button>`;
      document.getElementById('signInBtn').addEventListener('click', () => { isSignUp = false; updateAuthModal(); authModal.classList.add('active'); });
      uploadArea.style.display = 'none';
    }

    async function saveVideosToBin() {
      const binId = localStorage.getItem('awatch_bin_id') || JSONBIN_BIN_ID;
      await fetch(`https://api.jsonbin.io/v3/b/${binId}`, { method:'PUT', headers:JSONBIN_HEADERS, body:JSON.stringify({ videos:allVideos }) });
      localStorage.setItem('awatch_video_cache', JSON.stringify(allVideos));
    }

    async function deleteVideo(url) {
      if (!currentUser) return;
      
      const video = allVideos.find(v => v.url === url);
      if (!video) return;
      
      // Check permission: admin can delete any, users can delete their own
      if (!isAdmin && video.uploader !== currentUser) {
        alert('You can only delete your own videos.');
        return;
      }
      
      const confirmMsg = isAdmin && video.uploader !== currentUser 
        ? `Admin: Delete "${video.title}" by ${video.uploader}?`
        : `Delete your video "${video.title}"?`;
      
      if (!confirm(confirmMsg)) return;
      
      allVideos = allVideos.filter(v => v.url !== url);
      await saveVideosToBin();
      renderVideoGrid();
    }

    async function loadVideosFromBin() {
      syncStatus.textContent = '🔄 Syncing videos...';
      videosGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">Loading videos...</p>';
      try {
        const binId = localStorage.getItem('awatch_bin_id') || JSONBIN_BIN_ID;
        const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, { headers:{ 'X-Master-Key':JSONBIN_API_KEY } });
        if (!response.ok) throw new Error('Failed to load');
        const data = await response.json();
        allVideos = data.record?.videos || [];
        allVideos.forEach(v => { v.likes = v.likes || 0; v.dislikes = v.dislikes || 0; v.views = v.views || 0; });
        syncStatus.textContent = '✅ Synced';
        setTimeout(() => { syncStatus.textContent = ''; }, 2000);
        renderVideoGrid();
      } catch (err) {
        syncStatus.textContent = '⚠️ Offline mode';
        const cached = localStorage.getItem('awatch_video_cache');
        if (cached) { allVideos = JSON.parse(cached); renderVideoGrid(); }
        else { videosGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#aaa;">Could not load videos.</p>'; }
      }
    }

    function renderVideoGrid() {
      videosGrid.innerHTML = '';
      if (allVideos.length === 0) { videosGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#aaa;">No videos yet.</p>'; videoCount.textContent = '0 videos'; return; }
      allVideos.sort((a, b) => b.uploadedAt - a.uploadedAt);
      allVideos.forEach(data => addVideoCard(data));
      videoCount.textContent = `${allVideos.length} video${allVideos.length > 1 ? 's' : ''}`;
    }

    function addVideoCard(data) {
      const existing = videosGrid.querySelector(`[data-url="${data.url.replace(/"/g, '&quot;')}"]`);
      if (existing) return;
      const views = data.views || 0;
      const viewText = views === 1 ? '1 view' : `${views} views`;
      const canDelete = isAdmin || (currentUser && data.uploader === currentUser);
      
      const card = document.createElement('div');
      card.className = 'video-card';
      card.setAttribute('data-url', data.url);
      card.innerHTML = `
        <div class="thumbnail">▶️<div class="view-count">👁 ${viewText}</div></div>
        <div class="video-info">
          <div class="video-title">${escapeHtml(data.title)}</div>
          <div class="video-meta">${escapeHtml(data.uploader || 'Unknown')}${data.uploader === ADMIN_USERNAME ? ' <span class="admin-badge">ADMIN</span>' : ''} • ${timeAgo(data.uploadedAt)}</div>
          <div class="video-actions">
            <button class="vote-btn like-btn">👍 <span>${data.likes || 0}</span></button>
            <button class="vote-btn dislike-btn">👎 <span>${data.dislikes || 0}</span></button>
            ${canDelete ? `<button class="delete-btn">🗑 Delete</button>` : ''}
          </div>
        </div>`;

      card.addEventListener('click', (e) => {
        if (e.target.closest('.vote-btn') || e.target.closest('.delete-btn')) return;
        data.views = (data.views || 0) + 1; saveVideosToBin(); playVideo(data.url); renderVideoGrid();
      });

      card.querySelector('.like-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!currentUser) return;
        const userVotes = getUserVotes();
        const prevVote = userVotes[`${currentUser}_${data.url}`];
        if (prevVote === 'like') return;
        if (prevVote === 'dislike') data.dislikes = Math.max(0, (data.dislikes || 1) - 1);
        data.likes = (data.likes || 0) + 1;
        userVotes[`${currentUser}_${data.url}`] = 'like';
        saveUserVotes(userVotes);
        await saveVideosToBin();
        renderVideoGrid();
      });

      card.querySelector('.dislike-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!currentUser) return;
        const userVotes = getUserVotes();
        const prevVote = userVotes[`${currentUser}_${data.url}`];
        if (prevVote === 'dislike') return;
        if (prevVote === 'like') data.likes = Math.max(0, (data.likes || 1) - 1);
        data.dislikes = (data.dislikes || 0) + 1;
        userVotes[`${currentUser}_${data.url}`] = 'dislike';
        saveUserVotes(userVotes);
        await saveVideosToBin();
        renderVideoGrid();
      });

      const delBtn = card.querySelector('.delete-btn');
      if (delBtn) {
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteVideo(data.url);
        });
      }

      const userVotes = getUserVotes();
      const myVote = userVotes[`${currentUser}_${data.url}`];
      if (myVote === 'like') card.querySelector('.like-btn').classList.add('voted-like');
      if (myVote === 'dislike') card.querySelector('.dislike-btn').classList.add('voted-dislike');

      videosGrid.appendChild(card);
    }

    uploadBtn.addEventListener('click', () => videoFileInput.click());

    videoFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (!currentUser) { alert('Please sign in first.'); return; }
      if (file.size > 100 * 1024 * 1024) { alert('File too large! Max 100MB.'); return; }
      uploadProgress.style.display = 'block'; uploadProgress.value = 0; uploadStatus.textContent = 'Uploading video...';
      try {
        const formData = new FormData(); formData.append('file', file);
        const uploadResponse = await fetch('https://tmpfiles.org/api/v1/upload', { method:'POST', body:formData });
        if (!uploadResponse.ok) throw new Error('Video upload failed');
        const uploadData = await uploadResponse.json();
        const fileUrl = uploadData.data.url.replace('https://tmpfiles.org/', 'https://tmpfiles.org/dl/');
        uploadStatus.textContent = 'Syncing...';
        const binId = localStorage.getItem('awatch_bin_id') || JSONBIN_BIN_ID;
        let currentVideos = [];
        try { const getResponse = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, { headers:{ 'X-Master-Key':JSONBIN_API_KEY } }); if (getResponse.ok) { const d = await getResponse.json(); currentVideos = d.record?.videos || []; } } catch(e) {}
        currentVideos.push({ title:file.name.replace(/\.[^/.]+$/, ""), url:fileUrl, uploader:currentUser, uploadedAt:Date.now(), likes:0, dislikes:0, views:0 });
        const updateResponse = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, { method:'PUT', headers:JSONBIN_HEADERS, body:JSON.stringify({ videos:currentVideos }) });
        if (!updateResponse.ok) throw new Error('Sync failed');
        allVideos = currentVideos;
        localStorage.setItem('awatch_video_cache', JSON.stringify(allVideos));
        uploadProgress.style.display = 'none'; uploadStatus.textContent = '✅ Upload complete!'; videoFileInput.value = '';
        setTimeout(() => { uploadStatus.textContent = ''; }, 3000);
        renderVideoGrid();
      } catch (err) { uploadStatus.textContent = '❌ ' + err.message; uploadProgress.style.display = 'none'; }
    });

    function playVideo(url) { videoPlayer.src = url; playerOverlay.classList.add('active'); }
    closePlayer.addEventListener('click', () => { videoPlayer.pause(); videoPlayer.src = ''; playerOverlay.classList.remove('active'); });

    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text || ''; return div.innerHTML; }
    function timeAgo(ts) { if (!ts) return 'just now'; const d = (Date.now() - ts) / 1000; if (d < 60) return 'just now'; if (d < 3600) return Math.floor(d/60) + 'm ago'; if (d < 86400) return Math.floor(d/3600) + 'h ago'; return Math.floor(d/86400) + 'd ago'; }

    window.addEventListener('click', (e) => { if (e.target === authModal) authModal.classList.remove('active'); if (e.target === playerOverlay) { videoPlayer.pause(); videoPlayer.src = ''; playerOverlay.classList.remove('active'); } });

    const storedUser = localStorage.getItem(CURRENT_USER_KEY);
    if (storedUser && getUsers()[storedUser]) { loginSuccess(storedUser); } else { renderLoggedOutUI(); loadVideosFromBin(); }
    setInterval(() => { loadVideosFromBin(); }, 30000);
  </script>
</body>
</html>
