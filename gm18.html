<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awatch – Your Video Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Roboto,sans-serif; background:#0f0f0f; color:white; }
    header { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:#202020; position:sticky; top:0; z-index:100; }
    .logo { font-size:1.8rem; font-weight:bold; color:#ff4d4d; } .logo span { color:white; }
    .user-actions { display:flex; gap:10px; align-items:center; }
    .btn { background:#ff4d4d; border:none; color:white; padding:8px 16px; border-radius:20px; cursor:pointer; font-weight:bold; }
    .btn:hover { background:#e60000; }
    .btn-outline { background:transparent; border:1px solid #ff4d4d; color:#ff4d4d; }
    .videos-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:20px; padding:20px; }
    .video-card { background:#272727; border-radius:12px; overflow:hidden; cursor:pointer; transition:transform 0.2s; }
    .video-card:hover { transform:scale(1.02); }
    .thumbnail { width:100%; height:180px; background:#111; display:flex; align-items:center; justify-content:center; font-size:3rem; color:#666; }
    .video-info { padding:10px; } .video-title { font-weight:bold; margin-bottom:5px; } .video-meta { font-size:0.85rem; color:#aaa; }
    .upload-area { display:flex; justify-content:center; margin:20px; }
    progress { width:100%; margin-top:8px; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:200; }
    .modal.active { display:flex; }
    .modal-content { background:#202020; padding:30px; border-radius:15px; width:90%; max-width:400px; text-align:center; }
    .modal-content input { width:100%; padding:12px; margin:10px 0; border-radius:25px; border:1px solid #444; background:#121212; color:white; font-size:1rem; }
    .modal-content h2 { margin-bottom:15px; } .close { float:right; cursor:pointer; font-size:1.5rem; }
    .player-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:300; justify-content:center; align-items:center; flex-direction:column; }
    .player-overlay.active { display:flex; }
    .player-overlay video { max-width:90%; max-height:80%; border-radius:10px; }
    .close-player { position:absolute; top:20px; right:30px; font-size:2rem; cursor:pointer; }
    .user-greeting { margin-right:10px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">A<span>watch</span></div>
    <div class="user-actions" id="userActions"></div>
  </header>

  <div class="upload-area" id="uploadArea" style="display:none;">
    <input type="file" id="videoFile" accept="video/*" style="display:none;">
    <button class="btn" id="uploadBtn">📤 Upload Video</button>
    <progress id="uploadProgress" value="0" max="100" style="display:none;"></progress>
  </div>

  <div class="videos-grid" id="videosGrid"></div>

  <!-- Auth Modal -->
  <div class="modal" id="authModal">
    <div class="modal-content">
      <span class="close" id="closeAuth">&times;</span>
      <h2 id="authTitle">Sign In to Awatch</h2>
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="password" id="passwordInput" placeholder="Password">
      <button class="btn" id="authActionBtn">Sign In</button>
      <p style="margin-top:15px;"><a href="#" id="toggleAuth">Don't have an account? Sign Up</a></p>
      <p id="authError" style="color:#ff4d4d; margin-top:10px;"></p>
    </div>
  </div>

  <!-- Video Player Overlay -->
  <div class="player-overlay" id="playerOverlay">
    <span class="close-player" id="closePlayer">&times;</span>
    <video id="videoPlayer" controls autoplay></video>
  </div>

  <script>
    // ============ Gun + SEA setup (zero config) ============
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const user = gun.user();

    // UI elements
    const userActionsDiv = document.getElementById('userActions');
    const videosGrid = document.getElementById('videosGrid');
    const uploadArea = document.getElementById('uploadArea');
    const videoFileInput = document.getElementById('videoFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadProgress = document.getElementById('uploadProgress');
    const authModal = document.getElementById('authModal');
    const closeAuth = document.getElementById('closeAuth');
    const authTitle = document.getElementById('authTitle');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const authActionBtn = document.getElementById('authActionBtn');
    const toggleAuth = document.getElementById('toggleAuth');
    const authError = document.getElementById('authError');
    const playerOverlay = document.getElementById('playerOverlay');
    const videoPlayer = document.getElementById('videoPlayer');
    const closePlayer = document.getElementById('closePlayer');

    let isSignUp = false;
    let currentUser = null;

    // ── Auth modal logic ──
    function updateAuthModal() {
      if (isSignUp) {
        authTitle.textContent = 'Create Account';
        authActionBtn.textContent = 'Sign Up';
        toggleAuth.innerHTML = 'Already have an account? <a href="#">Sign In</a>';
      } else {
        authTitle.textContent = 'Sign In to Awatch';
        authActionBtn.textContent = 'Sign In';
        toggleAuth.innerHTML = 'Don\'t have an account? <a href="#">Sign Up</a>';
      }
      authError.textContent = '';
    }

    toggleAuth.addEventListener('click', (e) => {
      e.preventDefault();
      isSignUp = !isSignUp;
      updateAuthModal();
    });

    closeAuth.addEventListener('click', () => authModal.classList.remove('active'));

    authActionBtn.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (!username || !password) {
        authError.textContent = 'Please fill in all fields.';
        return;
      }

      if (isSignUp) {
        user.create(username, password, (ack) => {
          if (ack.err) {
            authError.textContent = ack.err;
          } else {
            authModal.classList.remove('active');
            loginSuccess(ack.pub);
          }
        });
      } else {
        user.auth(username, password, (ack) => {
          if (ack.err) {
            authError.textContent = ack.err;
          } else {
            authModal.classList.remove('active');
            loginSuccess(ack.pub);
          }
        });
      }
    });

    // ── UI after login ──
    function loginSuccess(pub) {
      currentUser = { pub, alias: usernameInput.value.trim() };
      renderLoggedInUI();
      loadAllVideos();
    }

    function renderLoggedInUI() {
      userActionsDiv.innerHTML = `
        <span class="user-greeting">👤 ${escapeHtml(currentUser.alias)}</span>
        <button class="btn btn-outline" id="logoutBtn">Logout</button>
      `;
      document.getElementById('logoutBtn').addEventListener('click', () => {
        user.leave();
        currentUser = null;
        renderLoggedOutUI();
        loadAllVideos();
      });
      uploadArea.style.display = 'flex';
    }

    function renderLoggedOutUI() {
      userActionsDiv.innerHTML = `<button class="btn" id="signInBtn">Sign In</button>`;
      document.getElementById('signInBtn').addEventListener('click', () => {
        isSignUp = false;
        updateAuthModal();
        authModal.classList.add('active');
      });
      uploadArea.style.display = 'none';
    }

    // ── Upload to catbox.moe ──
    uploadBtn.addEventListener('click', () => videoFileInput.click());

    videoFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (!currentUser) {
        alert('Please sign in first.');
        return;
      }

      const formData = new FormData();
      formData.append('reqtype', 'fileupload');
      formData.append('fileToUpload', file);

      uploadProgress.style.display = 'block';
      uploadProgress.value = 0;

      try {
        const response = await fetch('https://catbox.moe/user/api.php', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) throw new Error('Upload failed');
        const url = await response.text();
        if (!url.startsWith('http')) throw new Error(url);

        // Save video metadata to Gun
        const videoRef = gun.get('awatch_videos').set({
          title: file.name.replace(/\.[^/.]+$/, ""),
          url: url,
          uploader: currentUser.alias,
          uploadedAt: Date.now()
        });

        uploadProgress.style.display = 'none';
        videoFileInput.value = '';
        loadAllVideos();

      } catch (err) {
        alert('Upload error: ' + err.message);
        uploadProgress.style.display = 'none';
      }
    });

    // ── Load & display all videos ──
    function loadAllVideos() {
      videosGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">Loading videos...</p>';
      const videosNode = gun.get('awatch_videos');

      videosNode.map().once((data, id) => {
        if (!data) return;
        // Re‑render the whole grid whenever any video changes
        rebuildGrid();
      });

      // Initial load
      rebuildGrid();
    }

    function rebuildGrid() {
      const videosNode = gun.get('awatch_videos');
      videosGrid.innerHTML = '';
      let count = 0;
      videosNode.map().once((data, id) => {
        if (data && data.url) {
          count++;
          const card = document.createElement('div');
          card.className = 'video-card';
          card.innerHTML = `
            <div class="thumbnail">▶️</div>
            <div class="video-info">
              <div class="video-title">${escapeHtml(data.title)}</div>
              <div class="video-meta">${escapeHtml(data.uploader || 'Unknown')} • ${timeAgo(data.uploadedAt)}</div>
            </div>
          `;
          card.addEventListener('click', () => playVideo(data.url));
          videosGrid.appendChild(card);
        }
      });

      if (count === 0) {
        videosGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#aaa;">No videos yet. Upload the first one!</p>';
      }
    }

    function playVideo(url) {
      videoPlayer.src = url;
      playerOverlay.classList.add('active');
    }

    closePlayer.addEventListener('click', () => {
      videoPlayer.pause();
      videoPlayer.src = '';
      playerOverlay.classList.remove('active');
    });

    // ── Helpers ──
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function timeAgo(timestamp) {
      if (!timestamp) return 'just now';
      const diff = (Date.now() - timestamp) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      return Math.floor(diff/86400) + 'd ago';
    }

    // Close modals on outside click
    window.addEventListener('click', (e) => {
      if (e.target === authModal) authModal.classList.remove('active');
      if (e.target === playerOverlay) {
        videoPlayer.pause();
        videoPlayer.src = '';
        playerOverlay.classList.remove('active');
      }
    });

    // Initial UI
    renderLoggedOutUI();
    loadAllVideos();
  </script>
</body>
</html>
