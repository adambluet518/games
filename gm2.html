<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cookie Clicker Deluxe</title>
<style>
html, body {
  height: 100%;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #2b1d1d, #0f0f0f);
  background-attachment: fixed;
  min-height: 100vh;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

h1 {
  margin-top: 20px;
  font-size: 40px;
}

.cookie {
  width: 190px;
  height: 190px;
  margin: 30px auto;
  position: relative;
  cursor: pointer;
  transition: transform 0.1s;
}

.cookie:active {
  transform: scale(0.95);
}

.cookie-shape {
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 30%, #e0b070, #b97a3a);
  border-radius: 40% 45% 38% 42%;
  position: relative;
  box-shadow: inset -10px -10px 0 rgba(0,0,0,0.2);
}

.chip {
  width: 12px;
  height: 12px;
  background: #4a2f1a;
  border-radius: 50%;
  position: absolute;
}

.stats {
  font-size: 22px;
}

.shop {
  margin-top: 20px;
}

button {
  padding: 10px 14px;
  margin: 6px;
  border: none;
  border-radius: 10px;
  background: #ffcc66;
  cursor: pointer;
}

button:hover {
  background: #ffd98a;
}

.floating {
  position: absolute;
  font-size: 18px;
  animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-50px); opacity: 0; }
}

.golden {
  position: fixed;
  width: 60px;
  height: 60px;
  background: gold;
  border-radius: 50%;
  box-shadow: 0 0 20px yellow;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>🍪 Cookie Clicker Deluxe</h1>

<div class="cookie" onclick="clickCookie()">
  <div class="cookie-shape" id="cookie"></div>
</div>

<div class="stats">
Cookies: <span id="count">0</span><br>
Level: <span id="level">1</span><br>
Click Power: <span id="clickPower">1</span>
</div>

<div class="shop">
<button onclick="buy('grandma')">Buy Grandma (50)</button>
<button onclick="buy('factory')">Buy Factory (200)</button>
<button onclick="buy('oven')">Buy Oven (500)</button>
</div>

<div class="shop">
<h3>🖱 Click Upgrades</h3>
<button onclick="buyClicker(1)">Small Mouse +1 (100)</button>
<button onclick="buyClicker(2)">Golden Mouse +5 (500)</button>
<button onclick="buyClicker(3)">Alien Clicker +20 (2000)</button>
</div>

<p>
Grandmas: <span id="grandma">0</span> | 
Factories: <span id="factory">0</span> | 
Ovens: <span id="oven">0</span>
</p>

<p>Achievements: <span id="achievements"></span></p>

<script>
let cookies = 0;
let grandma = 0;
let factory = 0;
let oven = 0;
let level = 1;
let achievements = [];

let clickPower = 1;

function update() {
  document.getElementById("count").innerText = Math.floor(cookies);
  document.getElementById("grandma").innerText = grandma;
  document.getElementById("factory").innerText = factory;
  document.getElementById("oven").innerText = oven;
  document.getElementById("level").innerText = level;
  document.getElementById("clickPower").innerText = clickPower;
  document.getElementById("achievements").innerText = achievements.join(", ");

  localStorage.setItem("save", JSON.stringify({cookies, grandma, factory, oven, level, achievements, clickPower}));
}

function clickCookie() {
  cookies += clickPower;
  spawnChip();
  showFloat("+" + clickPower);
  checkLevel();
  update();
}

function spawnChip() {
  const chip = document.createElement("div");
  chip.classList.add("chip");
  chip.style.left = Math.random() * 170 + "px";
  chip.style.top = Math.random() * 170 + "px";
  document.querySelector(".cookie-shape").appendChild(chip);
  setTimeout(() => chip.remove(), 600);
}

function showFloat(text) {
  const el = document.createElement("div");
  el.className = "floating";
  el.innerText = text;
  el.style.left = "50%";
  el.style.top = "40%";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function buy(type) {
  let cost = 0;
  if (type === "grandma") cost = 50;
  if (type === "factory") cost = 200;
  if (type === "oven") cost = 500;

  if (cookies >= cost) {
    cookies -= cost;
    if (type === "grandma") grandma++;
    if (type === "factory") factory++;
    if (type === "oven") oven++;

    showFloat("Bought " + type);
    checkLevel();
    update();
  }
}

function buyClicker(levelType) {
  let cost = 0;

  if (levelType === 1) cost = 100;
  if (levelType === 2) cost = 500;
  if (levelType === 3) cost = 2000;

  if (cookies >= cost) {
    cookies -= cost;

    if (levelType === 1) clickPower = 2;
    if (levelType === 2) clickPower = 5;
    if (levelType === 3) clickPower = 20;

    showFloat("Click Power Up!");
    achievements.push("Click Boost " + levelType);
    update();
  }
}

function checkLevel() {
  let newLevel = Math.floor(cookies / 100) + 1;
  if (newLevel > level) {
    level = newLevel;
    achievements.push("Level " + level);
  }
}

setInterval(() => {
  cookies += grandma * 1;
  cookies += factory * 5;
  cookies += oven * 20;

  spawnGoldenCookie();
  update();
}, 1000);

function spawnGoldenCookie() {
  if (Math.random() < 0.01) {
    const g = document.createElement("div");
    g.className = "golden";
    g.style.top = Math.random() * window.innerHeight + "px";
    g.style.left = Math.random() * window.innerWidth + "px";

    g.onclick = () => {
      cookies += 500;
      showFloat("GOLD +500!");
      g.remove();
    };

    document.body.appendChild(g);
    setTimeout(() => g.remove(), 4000);
  }
}

window.onload = () => {
  let save = JSON.parse(localStorage.getItem("save"));
  if (save) {
    cookies = save.cookies;
    grandma = save.grandma;
    factory = save.factory;
    oven = save.oven;
    level = save.level;
    achievements = save.achievements;
    clickPower = save.clickPower || 1;
  }
  update();
};
</script>

</body>
</html>
