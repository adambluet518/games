<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dino Runner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
        }
        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: none;
        }
        #game-over-screen h1 {
            margin: 0 0 10px 0;
            color: #d9534f;
        }
        #btn-restart {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #5cb85c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        #btn-restart:hover {
            background-color: #4cae4c;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #666;
            font-size: 16px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>
    
    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="btn-restart">PLAY AGAIN</button>
    </div>

    <div id="instructions">Press <strong>SPACEBAR</strong> or <strong>TAP</strong> Screen to Jump</div>

    <script>
        // --- GAME CONFIGURATION & GLOBALS ---
        let scene, camera, renderer;
        let dino, ground;
        let obstacles = [];
        
        // Physics & Gameplay variables
        let score = 0;
        let gameSpeed = 0.3;
        const maxGameSpeed = 0.8;
        let isGameOver = false;
        let isJumping = false;
        
        let dinoVelocityY = 0;
        const gravity = -0.015;
        const jumpForce = 0.35;
        const dinoFloorY = 0.5; 
        
        let timeSinceLastSpawn = 0;
        let spawnInterval = 100;

        // --- INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe0e0e0);
            scene.fog = new THREE.FogExp2(0xe0e0e0, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-8, 5, 12);
            camera.lookAt(4, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            createGround();
            createDino();

            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('touchstart', triggerJump);
            window.addEventListener('resize', onWindowResize);
            document.getElementById('btn-restart').addEventListener('click', restartGame);

            animate();
        }

        // --- CREATION FUNCTIONS ---
        function createGround() {
            const groundGeo = new THREE.BoxGeometry(1000, 1, 10);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.8 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.position.y = -0.5; 
            ground.receiveShadow = true;
            scene.add(ground);

            const grid = new THREE.GridHelper(1000, 100, 0x555555, 0xaaaaaa);
            grid.position.y = 0.01;
            scene.add(grid);
        }

        function createDino() {
            dino = new THREE.Group();

            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.5 });
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });

            const torso = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.8), bodyMat);
            torso.position.y = 0.8;
            torso.castShadow = true;
            dino.add(torso);

            const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 0.8), bodyMat);
            head.position.set(0.4, 1.6, 0);
            head.castShadow = true;
            dino.add(head);

            const snout = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.7), bodyMat);
            snout.position.set(1.1, 1.5, 0);
            snout.castShadow = true;
            dino.add(snout);

            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.6), bodyMat);
            tail.position.set(-0.7, 0.6, 0);
            tail.castShadow = true;
            dino.add(tail);

            const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.1), eyeMat);
            eyeL.position.set(0.6, 1.7, 0.41);
            const pupilL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), pupilMat);
            pupilL.position.set(0.65, 1.7, 0.46);
            dino.add(eyeL, pupilL);

            const eyeR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.1), eyeMat);
            eyeR.position.set(0.6, 1.7, -0.41);
            const pupilR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), pupilMat);
            pupilR.position.set(0.65, 1.7, -0.46);
            dino.add(eyeR, pupilR);

            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.9), bodyMat);
            arm.position.set(0.6, 1.0, 0);
            dino.add(arm);

            dino.position.set(0, dinoFloorY, 0);
            scene.add(dino);
        }

        function spawnObstacle() {
            const height = 1.2 + Math.random() * 1.5;
            const width = 0.4 + Math.random() * 0.4;
            const depth = 0.4 + Math.random() * 0.4;

            const obstacleMat = new THREE.MeshStandardMaterial({ color: 0x228b22, roughness: 0.9 }); 
            const obstacleGeo = new THREE.BoxGeometry(width, height, depth);
            const obstacleMesh = new THREE.Mesh(obstacleGeo, obstacleMat);
            
            obstacleMesh.position.set(40, height / 2, 0); 
            obstacleMesh.castShadow = true;

            if(height > 1.8) {
                const branch = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.3), obstacleMat);
                branch.position.set(-0.3, height/4, 0);
                obstacleMesh.add(branch);
            }

            scene.add(obstacleMesh);
            obstacles.push(obstacleMesh);
        }

        // --- CONTROLS & LOGIC ---
        function handleKeyDown(e) {
            if (e.code === 'Space') {
                triggerJump();
            }
        }

        function triggerJump() {
            if (isGameOver) return;
            if (!isJumping) {
                isJumping = true;
                dinoVelocityY = jumpForce;
            }
        }

        function checkCollision(mesh1, mesh2) {
            const box1 = new THREE.Box3().setFromObject(mesh1);
            const box2 = new THREE.Box3().setFromObject(mesh2);

            box1.expandByScalar(-0.1);
            box2.expandByScalar(-0.1);

            return box1.intersectsBox(box2);
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('final-score').innerText = Math.floor(score);
            document.getElementById('game-over-screen').style.display = 'block';
        }

        function restartGame() {
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];

            dino.position.set(0, dinoFloorY, 0);
            dinoVelocityY = 0;
            isJumping = false;

            score = 0;
            gameSpeed = 0.3;
            isGameOver = false;

            document.getElementById('score').innerText = "0";
            document.getElementById('game-over-screen').style.display = 'none';
        }

        // --- MAIN GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isGameOver) {
                score += 0.15;
                document.getElementById('score').innerText = Math.floor(score);
                
                if (gameSpeed < maxGameSpeed) {
                    gameSpeed += 0.0002; 
                }

                if (isJumping) {
                    dino.position.y += dinoVelocityY;
                    dinoVelocityY += gravity;

                    if (dino.position.y <= dinoFloorY) {
                        dino.position.y = dinoFloorY;
                        dinoVelocityY = 0;
                        isJumping = false;
                    }
                } else {
                    dino.rotation.z = Math.sin(Date.now() * 0.015) * 0.05;
                }

                timeSinceLastSpawn++;
                if (timeSinceLastSpawn > spawnInterval) {
                    if (Math.random() > 0.4) {
                        spawnObstacle();
                        timeSinceLastSpawn = 0;
                        spawnInterval = 60 + Math.random() * 80; 
                    }
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obstacle = obstacles[i];
                    obstacle.position.x -= gameSpeed;

                    if (checkCollision(dino, obstacle)) {
                        gameOver();
                    }

                    if (obstacle.position.x < -10) {
                        scene.remove(obstacle);
                        obstacles.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
